# .github/workflows/bulk-generate.yml
# MedBoard Pro — Bulk MCQ Generator via GitHub Actions
#
# HOW TO USE:
#   Go to GitHub → Actions tab → "Bulk MCQ Generator" → "Run workflow"
#   Fill in the options and click "Run workflow".
#
#   • Leave "Level" as "all" to run ALL 5 levels in parallel (recommended).
#   • Pick a specific level to target just that one.
#
# SECRETS REQUIRED (Settings → Secrets → Actions → New repository secret):
#   ANTHROPIC_API_KEY   — your Anthropic API key (sk-ant-...)
#   SUPABASE_URL        — https://vhzeeskhvkujihuvddcc.supabase.co
#   SUPABASE_ANON_KEY   — your Supabase anon key

name: Bulk MCQ Generator

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Exam level — pick one, or 'all' to run all 5 levels in parallel"
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "ABIM Endocrinology"
          - "ABIM Internal Medicine"
          - "USMLE Step 1"
          - "USMLE Step 2 CK"
          - "USMLE Step 3"
      count:
        description: "Questions per level"
        required: true
        default: "100"
      topic:
        description: "Specific topic (leave blank for weighted distribution across the level)"
        required: false
        default: ""
      ceiling:
        description: "Per-topic depth target (GEN_CAP_CEILING). 8 = current default; raise to grow the bank."
        required: false
        default: "8"
      mode:
        description: "Generation mode"
        required: true
        default: "standard"
        type: choice
        options:
          - standard
          - batch
      verify_pass:
        description: "Verify-pass mis-key detector (1=on, warn-only, ~2x cost)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      verify_model:
        description: "Verifier model (blank=same; claude-opus-4-8=cross-model)"
        required: false
        default: ""
      gen_expansion_factor:
        description: "Bank expansion factor (float >=1). 1=seed caps; >1 grows every weighted topic ceiling proportionally past the blueprint seed."
        required: false
        default: "1"
      gen_min_per_topic:
        description: "Floor: minimum items generated per weighted topic this run (0=off)."
        required: false
        default: "0"

jobs:
  generate-single:
    name: "Generate — ${{ github.event.inputs.level }}"
    if: github.event.inputs.level != 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Show parameters
        run: |
          echo "Level:  ${{ github.event.inputs.level }}"
          echo "Count:  ${{ github.event.inputs.count }}"
          echo "Topic:  ${{ github.event.inputs.topic || 'Weighted distribution' }}"
          echo "Ceiling:${{ github.event.inputs.ceiling }}"
          echo "Mode:   ${{ github.event.inputs.mode }}"
      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BULK_LEVEL:        ${{ github.event.inputs.level }}
          BULK_COUNT:        ${{ github.event.inputs.count }}
          BULK_TOPIC:        ${{ github.event.inputs.topic }}
          BULK_MODE:         ${{ github.event.inputs.mode }}
          GEN_CAP_CEILING:   ${{ github.event.inputs.ceiling }}
          VERIFY_PASS:       ${{ github.event.inputs.verify_pass }}
          VERIFY_MODEL:      ${{ github.event.inputs.verify_model }}
          GEN_EXPANSION_FACTOR: ${{ github.event.inputs.gen_expansion_factor }}
          GEN_MIN_PER_TOPIC: ${{ github.event.inputs.gen_min_per_topic }}
        run: node scripts/bulk-generate.js
      - name: Done
        if: success()
        run: echo "Done. Check Supabase mcqs table for new rows."
      - name: Failed
        if: failure()
        run: echo "Generation failed. Check ANTHROPIC_API_KEY / SUPABASE_* secrets and RLS INSERT policy."

  generate-all:
    name: "Generate — ${{ matrix.level }}"
    if: github.event.inputs.level == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        level:
          - "ABIM Endocrinology"
          - "ABIM Internal Medicine"
          - "USMLE Step 1"
          - "USMLE Step 2 CK"
          - "USMLE Step 3"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BULK_LEVEL:        ${{ matrix.level }}
          BULK_COUNT:        ${{ github.event.inputs.count }}
          BULK_MODE:         ${{ github.event.inputs.mode }}
          BULK_CONCURRENCY:  "3"
          GEN_CAP_CEILING:   ${{ github.event.inputs.ceiling }}
          VERIFY_PASS:       ${{ github.event.inputs.verify_pass }}
          VERIFY_MODEL:      ${{ github.event.inputs.verify_model }}
          GEN_EXPANSION_FACTOR: ${{ github.event.inputs.gen_expansion_factor }}
          GEN_MIN_PER_TOPIC: ${{ github.event.inputs.gen_min_per_topic }}
        run: node scripts/bulk-generate.js
      - name: Done
        if: success()
        run: echo "${{ matrix.level }} complete."
      - name: Failed
        if: failure()
        run: echo "${{ matrix.level }} failed. Check logs."
