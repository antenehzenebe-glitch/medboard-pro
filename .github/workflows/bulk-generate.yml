# .github/workflows/bulk-generate.yml
# MedBoard Pro — Bulk MCQ Generator via GitHub Actions
#
# HOW TO USE:
#   Go to GitHub → Actions tab → "Bulk MCQ Generator" → "Run workflow"
#   Fill in the options and click "Run workflow".
#
#   • Leave "Level" as "all" to run ALL 5 levels in parallel (recommended).
#   • Pick a specific level to target just that one.
#
# SECRETS REQUIRED (Settings → Secrets → Actions → New repository secret):
#   ANTHROPIC_API_KEY   — your Anthropic API key (sk-ant-...)
#   SUPABASE_URL        — https://vhzeeskhvkujihuvddcc.supabase.co
#   SUPABASE_ANON_KEY   — your Supabase anon key

name: Bulk MCQ Generator

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Exam level — pick one, or 'all' to run all 5 levels in parallel"
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "ABIM Endocrinology"
          - "ABIM Internal Medicine"
          - "USMLE Step 1"
          - "USMLE Step 2 CK"
          - "USMLE Step 3"
      count:
        description: "Questions per level"
        required: true
        default: "100"
      topic:
        description: "Specific topic (leave blank for weighted distribution across the level)"
        required: false
        default: ""
      mode:
        description: "Generation mode"
        required: true
        default: "standard"
        type: choice
        options:
          - standard
          - batch

jobs:
  # ── SINGLE LEVEL ──────────────────────────────────────────────────────────────
  generate-single:
    name: "Generate — ${{ github.event.inputs.level }}"
    if: github.event.inputs.level != 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show parameters
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  MedBoard Pro — Bulk MCQ Generator"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Level:  ${{ github.event.inputs.level }}"
          echo "  Count:  ${{ github.event.inputs.count }}"
          echo "  Topic:  ${{ github.event.inputs.topic || 'Weighted distribution' }}"
          echo "  Mode:   ${{ github.event.inputs.mode }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BULK_LEVEL:        ${{ github.event.inputs.level }}
          BULK_COUNT:        ${{ github.event.inputs.count }}
          BULK_TOPIC:        ${{ github.event.inputs.topic }}
          BULK_MODE:         ${{ github.event.inputs.mode }}
        run: node scripts/bulk-generate.js

      - name: Done
        if: success()
        run: echo "✅  Done! Check your Supabase mcqs table for new rows."

      - name: Failed
        if: failure()
        run: |
          echo "❌  Generation failed. Common causes:"
          echo "    - ANTHROPIC_API_KEY secret not set"
          echo "    - SUPABASE_URL or SUPABASE_ANON_KEY secret not set"
          echo "    - Supabase RLS policy blocking INSERT"

  # ── ALL LEVELS IN PARALLEL ────────────────────────────────────────────────────
  generate-all:
    name: "Generate — ${{ matrix.level }}"
    if: github.event.inputs.level == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        level:
          - "ABIM Endocrinology"
          - "ABIM Internal Medicine"
          - "USMLE Step 1"
          - "USMLE Step 2 CK"
          - "USMLE Step 3"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show parameters
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  MedBoard Pro — Bulk MCQ Generator (ALL LEVELS)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Level:  ${{ matrix.level }}"
          echo "  Count:  ${{ github.event.inputs.count }} per level"
          echo "  Mode:   ${{ github.event.inputs.mode }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BULK_LEVEL:        ${{ matrix.level }}
          BULK_COUNT:        ${{ github.event.inputs.count }}
          BULK_MODE:         ${{ github.event.inputs.mode }}
        run: node scripts/bulk-generate.js

      - name: Done
        if: success()
        run: echo "✅  ${{ matrix.level }} — complete!"

      - name: Failed
        if: failure()
        run: echo "❌  ${{ matrix.level }} — failed. Check logs above."
