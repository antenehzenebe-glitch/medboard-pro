const LEVELS = [
  {l:"USMLE Step 1",v:"USMLE Step 1 (M2 basic science focus)"},
  {l:"USMLE Step 2 CK",v:"USMLE Step 2 CK (M3/M4 clinical decision-making)"},
  {l:"USMLE Step 3",v:"USMLE Step 3 (PGY-1/2 clinical management)"},
  {l:"ABIM Internal Medicine",v:"ABIM Internal Medicine boards (residents)"},
  {l:"ABIM Endocrinology",v:"ABIM Endocrinology subspecialty boards (fellows)"},

const GUIDES = [
  {id:1,t:"ADA Standards of Medical Care in Diabetes",s:"Endocrinology",i:"📊",u:"https://diabetesjournals.org/care/issue/47/Supplement_1"},
  {id:2,t:"Endocrine Society Clinical Practice Guidelines",s:"Endocrinology",i:"🔬",u:"https://www.endocrine.org/clinical-practice-guidelines"},
  {id:3,t:"AACE Diabetes Management Guidelines",s:"Endocrinology",i:"🩺",u:"https://www.aace.com/publications/guidelines"},
  {id:4,t:"ACC/AHA Cardiovascular Guidelines",s:"Cardiology",i:"🫀",u:"https://www.acc.org/guidelines"},
  {id:5,t:"KDIGO Kidney Disease Guidelines",s:"Nephrology",i:"🫘",u:"https://kdigo.org/guidelines"},
  {id:6,t:"USPSTF Preventive Care Recommendations",s:"Preventive",i:"✅",u:"https://www.uspreventiveservicestaskforce.org/uspstf/recommendation-topics"},
  {id:7,t:"ESC Cardiovascular Guidelines",s:"Cardiology",i:"🏥",u:"https://www.escardio.org/Guidelines"},
  {id:8,t:"EASD Diabetes Management Guidelines",s:"Endocrinology",i:"🦋",u:"https://www.easd.eu/guidelines"},
  {id:9,t:"IDSA Infectious Disease Guidelines",s:"ID",i:"🦠",u:"https://www.idsociety.org/practice-guideline/alphabetical-guidelines"},
  {id:10,t:"NCCN Oncology Guidelines",s:"Oncology",i:"🎗",u:"https://www.nccn.org/guidelines/guidelines-detail"},
  {id:11,t:"ACR Rheumatology Guidelines",s:"Rheumatology",i:"🦴",u:"https://www.rheumatology.org/Practice-Quality/Clinical-Support/Clinical-Practice-Guidelines"},
  {id:12,t:"ATS/ERS Respiratory Guidelines",s:"Pulmonology",i:"🫁",u:"https://www.thoracic.org/statements"},
];

function App() {
  const [view, setView] = React.useState("login");
  const [user, setUser] = React.useState(null);
  const [loadingAuth, setLoadingAuth] = React.useState(true);
  const [email, setEmail] = React.useState("");
  const [pw, setPw] = React.useState("");
  const [nm, setNm] = React.useState("");
  const [authErr, setAuthErr] = React.useState("");
  const [authBusy, setAuthBusy] = React.useState(false);
  const [tab, setTab] = React.useState("home");

  // MCQ
  const [grp, setGrp] = React.useState("🎲 Random");
  const [topic, setTopic] = React.useState("Random — All Specialties");
  const [lvl, setLvl] = React.useState(LEVELS[3]);
  const [cnt, setCnt] = React.useState(5);
  const [exam, setExam] = React.useState(false);
  const [tLeft, setTLeft] = React.useState(null);
  const [tActive, setTActive] = React.useState(false);
  const [qs, setQs] = React.useState([]);
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState("");
  const [sel, setSel] = React.useState({});
  const [rev, setRev] = React.useState({});
  const [score, setScore] = React.useState({t:0,c:0,s:0});
  const tRef = React.useRef(null);

  // DeFi
  const [pools, setPools] = React.useState([]);
  const [dBusy, setDBusy] = React.useState(false);
  const [dErr, setDErr] = React.useState("");
  const [dChain, setDChain] = React.useState("All");
  const [wl, setWl] = React.useState([]);

  React.useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => {
      setUser(session?.user ?? null);
      setLoadingAuth(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const login = async () => {
    setAuthErr(""); setAuthBusy(true);
    const {error} = await sb.auth.signInWithPassword({email, password:pw});
    if (error) setAuthErr(error.message);
    setAuthBusy(false);
  };

  const signup = async () => {
    setAuthErr(""); setAuthBusy(true);
    if (pw.length < 8) { setAuthErr("Password must be at least 8 characters"); setAuthBusy(false); return; }
    const {error} = await sb.auth.signUp({email, password:pw, options:{data:{full_name:nm}}});
    if (error) setAuthErr(error.message);
    else setAuthErr("✅ Check your email to confirm your account!");
    setAuthBusy(false);
  };

  const gLogin = async () => {
    await sb.auth.signInWithOAuth({provider:"google", options:{redirectTo:window.location.href}});
  };

  const logout = async () => { await sb.auth.signOut(); };

  const fmtT = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const stopT = () => { clearInterval(tRef.current); setTActive(false); };

  const revealAll = React.useCallback((questions) => {
    setRev(p => { const n={...p}; questions.forEach((_,i) => n[i]=true); return n; });
  }, []);

  const startT = (total, questions) => {
    setTLeft(total*SECS); setTActive(true);
    tRef.current = setInterval(() => {
      setTLeft(t => {
        if (t<=1) { clearInterval(tRef.current); setTActive(false); revealAll(questions); return 0; }
        return t-1;
      });
    }, 1000);
  };

  // ── MCQ GENERATOR — CALLS NETLIFY FUNCTION ──
  const generate = async () => {
    stopT();
    setBusy(true); setErr(""); setQs([]); setSel({}); setRev({}); setTLeft(null);
    try {
      const res = await fetch("/.netlify/functions/generate-mcq", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic, level: lvl.v, count: cnt }),
      });
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setQs(data);
      setScore(s => ({...s, s: s.s+1}));
      if (exam) startT(data.length, data);
    } catch(e) {
      setErr("Failed to generate questions: " + e.message + ". Please try again.");
    }
    setBusy(false);
  };

  const reveal = (i) => {
    if (!sel[i]) return;
    const ok = sel[i] === qs[i].correct;
    setRev(p => ({...p,[i]:true}));
    setScore(s => ({t:s.t+1, c:s.c+(ok?1:0), s:s.s}));
  };

  const fetchDefi = async () => {
    setDBusy(true); setDErr("");
    try {
      const res = await fetch("https://yields.llama.fi/pools");
      const data = await res.json();
      const CH = ["Ethereum","Arbitrum","Solana","Polygon","BSC"];
      setPools(data.data
        .filter(p=>p.tvlUsd>=1e6&&p.apy>0&&p.apy<300&&CH.some(c=>p.chain?.toLowerCase().includes(c.toLowerCase())))
        .map(p=>({id:p.pool,proj:p.project,sym:p.symbol,
          chain:CH.find(c=>p.chain?.toLowerCase().includes(c.toLowerCase()))||p.chain,
          apy:p.apy,tvl:p.tvlUsd,
          risk:p.apy>40||p.tvlUsd<1e6?"High":p.apy>15?"Medium":"Low"}))
        .sort((a,b)=>b.apy-a.apy).slice(0,200));
    } catch(e) { setDErr("Could not load data. Try again."); }
    setDBusy(false);
  };

  const fAPY = n=>`${n.toFixed(2)}%`;
  const fTVL = n=>n>=1e9?`$${(n/1e9).toFixed(2)}B`:n>=1e6?`$${(n/1e6).toFixed(1)}M`:`$${(n/1e3).toFixed(0)}K`;
  const rC = r=>r==="Low"?"#10b981":r==="Medium"?"#f59e0b":"#ef4444";
  const cC = c=>({"Ethereum":"#627EEA","Arbitrum":"#28A0F0","Solana":"#9945FF","Polygon":"#8247E5","BSC":"#F3BA2F"}[c]||"#64748b");

  const qC = (i,l) => {
    if (!rev[i]) return sel[i]===l?GOLD:"transparent";
    if (l===qs[i].correct) return "#10b981";
    if (sel[i]===l) return "#ef4444";
    return "transparent";
  };

  const ss = Object.entries(rev).filter(([i])=>qs[i]&&sel[i]===qs[i].correct).length;
  const st = Object.keys(rev).length;
  const uname = user?.user_metadata?.full_name || user?.email?.split("@")[0] || "Doctor";

  const NB = ({id,label,icon}) => (
    <button onClick={()=>{setTab(id);if(id==="defi"&&!pools.length)fetchDefi();}}
      style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 14px",border:"none",borderRadius:8,cursor:"pointer",
        background:tab===id?`rgba(201,168,76,0.12)`:"transparent",
        borderBottom:tab===id?`2px solid ${GOLD}`:"2px solid transparent",
        color:tab===id?GOLD:"#64748b",fontWeight:600,fontSize:11}}>
      <span style={{fontSize:18}}>{icon}</span>{label}
    </button>
  );

  if (loadingAuth) return (
    <div style={{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:12,background:`linear-gradient(135deg,${NAVY},#1a3a7a)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:22,color:GOLD,margin:"0 auto 16px"}}>M</div>
        <p style={{color:"#475569"}}>Loading...</p>
      </div>
    </div>
  );

  if (!user) return (
    <div style={{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:52,height:52,borderRadius:12,background:`linear-gradient(135deg,${NAVY},#1a3a7a)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:22,color:GOLD,margin:"0 auto 12px"}}>M</div>
          <h1 style={{fontSize:22,fontWeight:800}}>MedBoard <span style={{color:GOLD}}>Pro</span></h1>
          <p style={{color:"#475569",fontSize:13,marginTop:4}}>Howard University · Board Prep Platform</p>
        </div>
        <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:28}}>
          <h2 style={{fontSize:18,fontWeight:800,marginBottom:20,textAlign:"center"}}>{view==="login"?"Sign In":"Create Account"}</h2>
          <button onClick={gLogin} style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"11px",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:14,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <span style={{fontWeight:800,color:"#4285f4"}}>G</span> Continue with Google
          </button>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{flex:1,height:1,background:BDR}}/><span style={{color:"#334155",fontSize:12}}>or</span><div style={{flex:1,height:1,background:BDR}}/>
          </div>
          {view==="signup"&&<div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>FULL NAME</label>
            <input value={nm} onChange={e=>setNm(e.target.value)} placeholder="Dr. John Smith"
              style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"10px 12px",borderRadius:8,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>EMAIL</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="doctor@hospital.com"
              style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"10px 12px",borderRadius:8,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>PASSWORD</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Minimum 8 characters"
              style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"10px 12px",borderRadius:8,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
          {authErr&&<div style={{background:authErr.startsWith("✅")?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)",border:`1px solid ${authErr.startsWith("✅")?"#10b981":"#ef4444"}`,borderRadius:8,padding:"9px 12px",color:authErr.startsWith("✅")?"#10b981":"#ef4444",fontSize:13,marginBottom:12}}>{authErr}</div>}
          <button onClick={view==="login"?login:signup} disabled={authBusy}
            style={{width:"100%",background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"12px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:15,marginBottom:12}}>
            {authBusy?"Please wait...":view==="login"?"Sign In →":"Create Account →"}
          </button>
          <p style={{textAlign:"center",color:"#475569",fontSize:13}}>
            {view==="login"?"No account? ":"Have account? "}
            <span onClick={()=>{setView(view==="login"?"signup":"login");setAuthErr("");}} style={{color:GOLD,cursor:"pointer",fontWeight:600}}>
              {view==="login"?"Sign Up":"Sign In"}
            </span>
          </p>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{background:BG,minHeight:"100vh"}}>
      <nav style={{background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${BDR}`,padding:"0 4%",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:30,height:30,borderRadius:7,background:`linear-gradient(135deg,${NAVY},#1a3a7a)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:GOLD}}>M</div>
            <span style={{fontWeight:700,fontSize:15}}>MedBoard <span style={{color:GOLD}}>Pro</span></span>
          </div>
          <div style={{display:"flex",gap:2}}>
            <NB id="home" label="Home" icon="🏠"/>
            <NB id="mcq" label="MCQs" icon="🎯"/>
            <NB id="guides" label="Guides" icon="📚"/>
            <NB id="progress" label="Progress" icon="📊"/>
            <NB id="defi" label="DeFi" icon="💰"/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:12,fontWeight:600}}>{uname}</div>
              <div style={{fontSize:10,color:"#475569"}}>{user.email}</div>
            </div>
            <button onClick={logout} style={{background:"transparent",border:`1px solid ${BDR}`,color:"#475569",padding:"4px 9px",borderRadius:6,cursor:"pointer",fontSize:11}}>Out</button>
          </div>
        </div>
      </nav>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"22px 4%"}}>

        {tab==="home"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>Welcome, {uname}! 👋</h2>
            <p style={{color:"#475569",fontSize:13,marginBottom:20}}>Howard University College of Medicine · Board Prep Dashboard</p>
            <div style={{background:`rgba(201,168,76,0.08)`,border:`1px solid ${GOLD}`,borderRadius:12,padding:18,marginBottom:20,display:"flex",gap:20,flexWrap:"wrap"}}>
              <div><div style={{fontSize:11,color:"#64748b",marginBottom:2}}>Account</div><div style={{fontSize:14,fontWeight:700,color:"#10b981"}}>✅ Active</div></div>
              <div><div style={{fontSize:11,color:"#64748b",marginBottom:2}}>Sessions</div><div style={{fontSize:16,fontWeight:800}}>{score.s}</div></div>
              <div><div style={{fontSize:11,color:"#64748b",marginBottom:2}}>Questions</div><div style={{fontSize:16,fontWeight:800}}>{score.t}</div></div>
              <div><div style={{fontSize:11,color:"#64748b",marginBottom:2}}>Accuracy</div><div style={{fontSize:16,fontWeight:800,color:score.t>0?(score.c/score.t>0.7?"#10b981":"#f59e0b"):"#475569"}}>{score.t>0?`${Math.round(score.c/score.t*100)}%`:"—"}</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:12,marginBottom:24}}>
              {[{icon:"🎯",title:"Generate MCQs",tab:"mcq",color:"#6366f1"},{icon:"📚",title:"Guidelines",tab:"guides",color:"#10b981"},{icon:"📊",title:"Progress",tab:"progress",color:"#f59e0b"},{icon:"💰",title:"DeFi Tracker",tab:"defi",color:GOLD}].map(a=>(
                <div key={a.tab} onClick={()=>{setTab(a.tab);if(a.tab==="defi"&&!pools.length)fetchDefi();}}
                  style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:12,padding:16,cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=a.color}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=BDR}>
                  <div style={{fontSize:24,marginBottom:8}}>{a.icon}</div>
                  <div style={{fontWeight:700,fontSize:14,color:a.color}}>{a.title}</div>
                </div>
              ))}
            </div>
            <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:12,padding:18}}>
              <h3 style={{fontWeight:700,marginBottom:12,fontSize:14}}>📋 Training Continuum</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
                {[{e:"USMLE Step 1",w:"M2",c:"#3B82F6"},{e:"USMLE Step 2",w:"M3/M4",c:"#8B5CF6"},{e:"USMLE Step 3",w:"PGY-1/2",c:"#6366f1"},{e:"ABIM IM",w:"Residents",c:"#10b981"},{e:"ABIM Endo",w:"Fellows",c:GOLD}].map(e=>(
                  <div key={e.e} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${e.c}44`,borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:800,color:e.c}}>{e.e}</div>
                    <div style={{fontSize:10,color:"#475569"}}>{e.w}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab==="mcq"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>🎯 AI MCQ Generator</h2>
            <p style={{color:"#475569",marginBottom:18,fontSize:13}}>Random or topic-specific · Study or Exam mode · 5 board levels</p>
            <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:14,padding:18,marginBottom:18}}>
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                <button onClick={()=>setExam(false)} style={{flex:1,padding:"11px",borderRadius:9,border:`2px solid ${!exam?"#10b981":BDR}`,background:!exam?"rgba(16,185,129,0.1)":"transparent",color:!exam?"#10b981":"#64748b",fontWeight:700,cursor:"pointer",fontSize:13}}>
                  📖 Study Mode<br/><span style={{fontSize:11,fontWeight:400}}>Untimed · Instant feedback</span>
                </button>
                <button onClick={()=>setExam(true)} style={{flex:1,padding:"11px",borderRadius:9,border:`2px solid ${exam?"#ef4444":BDR}`,background:exam?"rgba(239,68,68,0.1)":"transparent",color:exam?"#ef4444":"#64748b",fontWeight:700,cursor:"pointer",fontSize:13}}>
                  ⏱️ Exam Mode<br/><span style={{fontSize:11,fontWeight:400}}>90 sec/question · Auto-submit</span>
                </button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:14}}>
                <div>
                  <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>SPECIALTY</label>
                  <select value={grp} onChange={e=>{setGrp(e.target.value);setTopic(GROUPS[e.target.value][0]);}}
                    style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"8px",borderRadius:7,fontSize:13}}>
                    {Object.keys(GROUPS).map(g=><option key={g}>{g}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>TOPIC</label>
                  <select value={topic} onChange={e=>setTopic(e.target.value)}
                    style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"8px",borderRadius:7,fontSize:13}}>
                    {GROUPS[grp].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>BOARD LEVEL</label>
                  <select value={lvl.l} onChange={e=>setLvl(LEVELS.find(x=>x.l===e.target.value))}
                    style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"8px",borderRadius:7,fontSize:13}}>
                    {LEVELS.map(x=><option key={x.l}>{x.l}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>QUESTIONS (×5)</label>
                  <div style={{display:"flex",gap:5}}>
                    {[5,10,15,20].map(n=>(
                      <button key={n} onClick={()=>setCnt(n)}
                        style={{flex:1,padding:"8px 0",borderRadius:7,border:`1px solid ${cnt===n?GOLD:BDR}`,background:cnt===n?`rgba(201,168,76,0.15)`:"transparent",color:cnt===n?GOLD:"#64748b",fontWeight:700,cursor:"pointer",fontSize:13}}>
                        {n}
                      </button>
                    ))}
                  </div>
                  {exam&&<p style={{fontSize:11,color:"#ef4444",marginTop:4}}>⏱️ {cnt*1.5} min total</p>}
                </div>
              </div>
              <button onClick={generate} disabled={busy}
                style={{width:"100%",background:busy?"#334155":exam?`linear-gradient(135deg,#7f1d1d,#b91c1c)`:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${exam?"#ef4444":GOLD}`,color:busy?"#64748b":"#fff",padding:"12px",borderRadius:9,cursor:busy?"not-allowed":"pointer",fontWeight:700,fontSize:14}}>
                {busy?"⏳ Generating questions...":exam?`⏱️ Start Exam — ${cnt} Questions (${cnt*1.5} min)`:`⚡ Start Study Session — ${cnt} Questions`}
              </button>
            </div>

            {err&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid #ef4444",borderRadius:9,padding:13,color:"#ef4444",marginBottom:14}}>{err}</div>}

            {exam&&qs.length>0&&(
              <div style={{background:CARD,border:`1px solid ${tActive?"#ef4444":BDR}`,borderRadius:11,padding:"13px 18px",marginBottom:14,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{fontSize:24,fontWeight:800,color:tLeft<60?"#ef4444":tLeft<180?"#f59e0b":"#10b981",fontFamily:"monospace"}}>⏱️ {tLeft!==null?fmtT(tLeft):"--:--"}</div>
                <div style={{flex:1,minWidth:180}}>
                  <div style={{height:7,background:"#1e293b",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:tLeft!==null?`${(tLeft/(cnt*SECS))*100}%`:"100%",background:tLeft<60?"#ef4444":tLeft<180?"#f59e0b":"#10b981",borderRadius:4,transition:"width 1s linear"}}/>
                  </div>
                </div>
                <span style={{fontSize:12,color:"#64748b"}}>{st}/{qs.length} answered</span>
                {tActive&&<button onClick={()=>{stopT();revealAll(qs);}} style={{background:"transparent",border:"1px solid #ef4444",color:"#ef4444",padding:"5px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>End Exam</button>}
                {!tActive&&tLeft===0&&<span style={{color:"#ef4444",fontWeight:700,fontSize:13}}>⏰ Time's up!</span>}
              </div>
            )}

            {st>0&&<div style={{background:"rgba(201,168,76,0.1)",border:`1px solid ${GOLD}`,borderRadius:9,padding:"10px 16px",marginBottom:14,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              <span>📊</span><span style={{fontWeight:700,color:GOLD}}>Score: {ss}/{st}</span>
              <span style={{color:"#64748b",fontSize:13}}>({Math.round(ss/st*100)}%)</span>
              <span style={{color:"#475569",fontSize:12}}>{qs.length-st} remaining</span>
            </div>}

            {qs.map((q,i)=>(
              <div key={i} style={{background:CARD,border:`1px solid ${rev[i]?(sel[i]===q.correct?"#10b981":"#ef4444"):BDR}`,borderRadius:13,padding:22,marginBottom:16}}>
                <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:13,flexWrap:"wrap"}}>
                  <span style={{background:NAVY,border:`1px solid ${GOLD}`,color:GOLD,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0}}>Q{i+1}</span>
                  {q.topic&&<span style={{background:"rgba(99,102,241,0.15)",color:"#818cf8",borderRadius:20,padding:"2px 9px",fontSize:11}}>{q.topic}</span>}
                  <p style={{margin:0,lineHeight:1.8,fontSize:14,color:"#e2e8f0",flex:1}}>{q.stem}</p>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:13}}>
                  {Object.entries(q.choices).map(([l,t])=>(
                    <button key={l} onClick={()=>{if(!rev[i])setSel(p=>({...p,[i]:l}));}}
                      style={{textAlign:"left",padding:"10px 13px",borderRadius:8,cursor:rev[i]?"default":"pointer",
                        border:`1px solid ${qC(i,l)==="transparent"?BDR:qC(i,l)}`,
                        background:qC(i,l)==="transparent"?"rgba(255,255,255,0.02)":`${qC(i,l)}22`,
                        color:rev[i]&&l===q.correct?"#10b981":rev[i]&&sel[i]===l?"#ef4444":"#cbd5e1",
                        fontWeight:sel[i]===l?700:400,fontSize:13}}>
                      <span style={{fontWeight:800,marginRight:8}}>{l}.</span>{t}
                      {rev[i]&&l===q.correct&&" ✓"}{rev[i]&&sel[i]===l&&l!==q.correct&&" ✗"}
                    </button>
                  ))}
                </div>
                {!rev[i]?(
                  <div style={{display:"flex",gap:9,alignItems:"center"}}>
                    <button onClick={()=>reveal(i)} disabled={!sel[i]}
                      style={{background:sel[i]?`linear-gradient(135deg,${NAVY},#1a4a9a)`:"#1e293b",border:`1px solid ${sel[i]?GOLD:BDR}`,color:sel[i]?"#fff":"#475569",padding:"8px 20px",borderRadius:7,cursor:sel[i]?"pointer":"not-allowed",fontWeight:600,fontSize:13}}>
                      {exam?"Submit & Next →":"Submit Answer"}
                    </button>
                    {!sel[i]&&<span style={{fontSize:12,color:"#334155"}}>Select an answer first</span>}
                  </div>
                ):(
                  <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${BDR}`,borderRadius:8,padding:13}}>
                    <p style={{margin:"0 0 5px",fontSize:12,fontWeight:700,color:GOLD}}>📖 Explanation</p>
                    <p style={{margin:0,color:"#94a3b8",lineHeight:1.8,fontSize:13}}>{q.explanation}</p>
                  </div>
                )}
              </div>
            ))}

            {qs.length>0&&st===qs.length&&(
              <div style={{background:"rgba(201,168,76,0.08)",border:`2px solid ${GOLD}`,borderRadius:13,padding:22,textAlign:"center"}}>
                <div style={{fontSize:38,marginBottom:10}}>🎓</div>
                <h3 style={{fontWeight:800,fontSize:18,marginBottom:6}}>Session Complete!</h3>
                <p style={{color:GOLD,fontSize:20,fontWeight:800,marginBottom:4}}>{ss}/{qs.length} Correct</p>
                <p style={{color:"#64748b",fontSize:14,marginBottom:18}}>{ss/qs.length>=0.8?"🏆 Excellent!":ss/qs.length>=0.6?"📈 Good — review missed questions":"💪 Keep practicing!"}</p>
                <button onClick={generate} style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"11px 26px",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:14}}>🔄 New Session</button>
              </div>
            )}
          </div>
        )}

        {tab==="guides"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>📚 Guidelines & Resources</h2>
            <p style={{color:"#475569",marginBottom:18,fontSize:13}}>Official society guidelines — always current, always free</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:13}}>
              {GUIDES.map(g=>(
                <div key={g.id} style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:12,padding:18,display:"flex",flexDirection:"column",gap:9}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=GOLD}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=BDR}>
                  <div style={{fontSize:26}}>{g.i}</div>
                  <div style={{fontWeight:700,fontSize:13,lineHeight:1.4}}>{g.t}</div>
                  <span style={{background:`rgba(201,168,76,0.1)`,border:`1px solid ${GOLD}44`,color:GOLD,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600,alignSelf:"flex-start"}}>{g.s}</span>
                  <a href={g.u} target="_blank" rel="noopener noreferrer"
                    style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"8px",borderRadius:7,fontWeight:600,fontSize:12,textAlign:"center",textDecoration:"none",marginTop:"auto"}}>
                    🔗 Open Official Guidelines
                  </a>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="progress"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>📊 Your Progress</h2>
            <p style={{color:"#475569",marginBottom:18,fontSize:13}}>Track your board prep performance</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:22}}>
              {[{l:"Sessions",v:score.s,i:"📝",c:"#6366f1"},{l:"Questions",v:score.t,i:"❓",c:"#3b82f6"},{l:"Correct",v:score.c,i:"✅",c:"#10b981"},{l:"Accuracy",v:score.t>0?`${Math.round(score.c/score.t*100)}%`:"—",i:"🎯",c:GOLD}].map(s=>(
                <div key={s.l} style={{background:CARD,border:`1px solid ${s.c}44`,borderRadius:11,padding:16,textAlign:"center"}}>
                  <div style={{fontSize:24,marginBottom:7}}>{s.i}</div>
                  <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:11,color:"#475569",marginTop:3}}>{s.l}</div>
                </div>
              ))}
            </div>
            {score.t===0?(
              <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:11,padding:32,textAlign:"center"}}>
                <div style={{fontSize:40,marginBottom:10}}>🎯</div>
                <p style={{color:"#475569",fontSize:13,marginBottom:14}}>No questions answered yet. Start the MCQ generator!</p>
                <button onClick={()=>setTab("mcq")} style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"10px 22px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13}}>Generate Questions →</button>
              </div>
            ):(
              <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:11,padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13,color:"#94a3b8"}}>Overall accuracy</span>
                  <span style={{fontSize:13,fontWeight:700,color:GOLD}}>{Math.round(score.c/score.t*100)}%</span>
                </div>
                <div style={{height:8,background:"#1e293b",borderRadius:4,overflow:"hidden",marginBottom:12}}>
                  <div style={{height:"100%",width:`${Math.round(score.c/score.t*100)}%`,background:`linear-gradient(90deg,${NAVY},${GOLD})`,borderRadius:4}}/>
                </div>
                <p style={{color:"#475569",fontSize:13}}>{score.c/score.t>=0.8?"🏆 Excellent! Well prepared for boards.":score.c/score.t>=0.6?"📈 Good progress! Keep practicing.":"💪 Keep going! Consistency is key."}</p>
              </div>
            )}
          </div>
        )}

        {tab==="defi"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>💰 DeFi Yield Tracker</h2>
            <p style={{color:"#475569",marginBottom:12,fontSize:13}}>Live yields — powered by DeFiLlama</p>
            <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,padding:"8px 13px",marginBottom:14,fontSize:12,color:"#fca5a5"}}>⚠️ Educational only. Not financial advice.</div>
            <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              {["All","Ethereum","Arbitrum","Solana","Polygon","BSC"].map(c=>(
                <button key={c} onClick={()=>setDChain(c)} style={{padding:"5px 12px",border:`1px solid ${dChain===c?GOLD:BDR}`,borderRadius:20,cursor:"pointer",background:dChain===c?`rgba(201,168,76,0.15)`:"transparent",color:dChain===c?GOLD:"#64748b",fontSize:12,fontWeight:600}}>{c}</button>
              ))}
              <button onClick={fetchDefi} style={{marginLeft:"auto",background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600}}>🔄 Refresh</button>
            </div>
            {dBusy&&<div style={{textAlign:"center",padding:"32px",color:"#475569"}}>⏳ Fetching live yield data...</div>}
            {dErr&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid #ef4444",borderRadius:8,padding:13,color:"#ef4444"}}>{dErr}</div>}
            {!dBusy&&!dErr&&!pools.length&&(
              <div style={{textAlign:"center",padding:"32px",color:"#475569"}}>
                <div style={{fontSize:32,marginBottom:8}}>💰</div>
                <button onClick={fetchDefi} style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"10px 20px",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13}}>Load Live Data</button>
              </div>
            )}
            {!dBusy&&pools.filter(p=>dChain==="All"||p.chain===dChain).slice(0,50).map(p=>(
              <div key={p.id} style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:10,padding:"12px 15px",display:"flex",alignItems:"center",gap:11,flexWrap:"wrap",marginBottom:8}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=GOLD}
                onMouseLeave={e=>e.currentTarget.style.borderColor=BDR}>
                <div style={{width:8,height:8,borderRadius:"50%",background:cC(p.chain),flexShrink:0}}/>
                <div style={{flex:2,minWidth:120}}>
                  <div style={{fontWeight:700,fontSize:13}}>{p.sym}</div>
                  <div style={{fontSize:10,color:"#475569"}}>{p.proj} · {p.chain}</div>
                </div>
                <div style={{textAlign:"center",minWidth:60}}>
                  <div style={{fontSize:15,fontWeight:800,color:p.apy>20?"#f59e0b":"#10b981"}}>{fAPY(p.apy)}</div>
                  <div style={{fontSize:9,color:"#475569"}}>APY</div>
                </div>
                <div style={{textAlign:"center",minWidth:60}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{fTVL(p.tvl)}</div>
                  <div style={{fontSize:9,color:"#475569"}}>TVL</div>
                </div>
                <span style={{background:`${rC(p.risk)}22`,border:`1px solid ${rC(p.risk)}`,color:rC(p.risk),borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>{p.risk}</span>
                <button onClick={()=>setWl(w=>w.includes(p.id)?w.filter(x=>x!==p.id):[...w,p.id])}
                  style={{background:"transparent",border:`1px solid ${wl.includes(p.id)?GOLD:BDR}`,color:wl.includes(p.id)?GOLD:"#475569",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12}}>
                  {wl.includes(p.id)?"⭐":"☆"}
                </button>
              </div>
            ))}
          </div>
        )}

      </div>
      <div style={{textAlign:"center",padding:"14px",color:"#1e293b",fontSize:11,borderTop:`1px solid ${BDR}`}}>
        MedBoard Pro · Anteneh Zenebe, MD, FACE · Howard University · antenehzenebe@gmail.com
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
