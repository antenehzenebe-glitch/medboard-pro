<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MedBoard Pro — Premium Medical QBank</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#f1f5f9;min-height:100vh}
button,select,input{font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeIn 0.3s ease}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.3);color:#C9A84C;padding:8px 16px;border-radius:24px;font-size:13px;font-weight:600;margin-bottom:24px}
.nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:#94a3b8;padding:8px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:64px;transition:0.2s}
.nav-btn.active{border-bottom:2px solid #C9A84C;color:#C9A84C;background:rgba(201,168,76,0.05)}
.quick-card{background:rgba(255,255,255,0.04);border:1px solid #1e293b;border-radius:12px;padding:20px;cursor:pointer;transition:0.2s}
.quick-card:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px);border-color:#334155}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const {createClient} = supabase;
const SB_URL = "https://vhzeeskhvkujihuvddcc.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoemVlc2todmt1amlodXZkZGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTQ1MzIsImV4cCI6MjA5MDM5MDUzMn0.xfStX1rfwDc4LpuC--krAEuEFq2RHNac58OIbOm__d0";
const sb = createClient(SB_URL, SB_KEY);
const NAVY="#002868", GOLD="#C9A84C", BG="#0a0a0f", CARD="rgba(255,255,255,0.04)", BDR="#1e293b";
const PORTAL_URL = "https://billing.stripe.com/p/login/fZufZ9fDJ4NVbNM5iS2sM00";

const LEVELS = [
  {v:"USMLE Step 1", l:"Step 1"}, {v:"USMLE Step 2 CK", l:"Step 2"},
  {v:"USMLE Step 3", l:"Step 3"}, {v:"ABIM Internal Medicine", l:"ABIM IM"},
  {v:"ABIM Endocrinology", l:"ABIM Endo"}
];

const GUIDES=[
  {id:1,t:"ADA Standards of Medical Care in Diabetes",s:"Endocrinology",i:"D",u:"https://diabetesjournals.org/care/issue/48/Supplement_1"},
  {id:2,t:"Endocrine Society Clinical Practice Guidelines",s:"Endocrinology",i:"E",u:"https://www.endocrine.org/clinical-practice-guidelines"},
  {id:3,t:"AACE Clinical Guidance",s:"Endocrinology",i:"A",u:"https://pro.aace.com/clinical-guidance"},
  {id:4,t:"ACC/AHA Cardiovascular Guidelines",s:"Cardiology",i:"C",u:"https://www.acc.org/guidelines"},
  {id:15,t:"NEJM Image Challenge",s:"Visual Dx",i:"N",u:"https://www.nejm.org/image-challenge"},
  {id:16,t:"ECG Wave-Maven — Harvard/BIDMC",s:"Cardiology",i:"E",u:"http://ecg.bidmc.harvard.edu"}
];

const GROUPS={
  "Diabetes":["Type 2 Management","Type 1 Insulin","DKA and HHS","Hypoglycemia","CGM and AID Systems"],
  "Thyroid":["Hypothyroidism","Hyperthyroidism","Thyroid Nodule","Thyroid Cancer"],
  "Adrenal":["Adrenal Insufficiency","Cushings Syndrome","Primary Aldosteronism","Pheochromocytoma"]
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
async function saveResponse(question, choice, isCorrect) {
  const {data:{session}} = await sb.auth.getSession();
  if (!session) return;
  const mcqRes = await sb.from("mcqs").select("id").eq("stem", question.stem).limit(1);
  const mcqId = mcqRes.data?.[0]?.id;
  if (!mcqId) return;
  await sb.from("user_responses").insert({ user_id: session.user.id, mcq_id: mcqId, selected_choice: choice, is_correct: isCorrect });
}

// ─── LANDING PAGE ─────────────────────────────────────────────────────────────
function LandingPage({setShowAuth}) {
  return (
    <div style={{minHeight:"100vh",background:BG, textAlign:"center", padding:"100px 5%"}}>
      <div className="hero-tag">🏥 Fellowship Associate Program Director — Howard University</div>
      <h1 style={{fontSize:"clamp(36px,6vw,64px)",fontWeight:900,color:"#f1f5f9",marginBottom:24}}>Board Prep Built by <br/><span style={{color:GOLD}}>Academic Attendings</span></h1>
      <p style={{fontSize:18,color:"#94a3b8",marginBottom:48}}>Premium QBank with integrated society guidelines and performance tracking.</p>
      <button onClick={()=>setShowAuth(true)} style={{background:"linear-gradient(135deg,"+NAVY+",#1a4a9a)",border:"2px solid #3b82f6",color:"#fff",padding:"16px 40px",borderRadius:12,fontWeight:800,fontSize:18,cursor:"pointer"}}>Access Premium QBank →</button>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = React.useState(null);
  const [tab, setTab] = React.useState("home");
  const [topic, setTopic] = React.useState("DKA and HHS");
  const [lvl, setLvl] = React.useState(LEVELS[3]);
  const [appState, setAppState] = React.useState("idle");
  const [question, setQuestion] = React.useState(null);
  const [preloadedQ, setPreloadedQ] = React.useState(null);
  const [sel, setSel] = React.useState("");
  const [revealed, setRevealed] = React.useState(false);
  const [history, setHistory] = React.useState({t:0, c:0});
  const [showAuth, setShowAuth] = React.useState(false);

  React.useEffect(() => {
    sb.auth.getSession().then(res => {
      if(res.data.session) { setUser(res.data.session.user); fetchHistory(res.data.session.user.id); }
    });
  }, []);

  async function fetchHistory(uid) {
    const {data} = await sb.from("user_responses").select("is_correct").eq("user_id", uid);
    if(data) setHistory({t: data.length, c: data.filter(r => r.is_correct).length});
  }

  // ─── THE SHADOW PRE-LOADER ──────────────────────────────────────────────────
  async function fetchOne(targetTopic, targetLvl) {
    // 1. Check DB first (Fast)
    const {data: bank} = await sb.from("mcqs").select("*").eq("topic", targetTopic).eq("exam_level", targetLvl).limit(10);
    if (bank?.length > 0) return bank[Math.floor(Math.random() * bank.length)];

    // 2. AI Fallback (Slow)
    const res = await fetch("/.netlify/functions/generate-mcq", { method: "POST", body: JSON.stringify({topic: targetTopic, level: targetLvl}) });
    const items = await res.json();
    return items[0];
  }

  async function handleLoadNext() {
    setSel(""); setRevealed(false);
    
    if (preloadedQ) {
      setQuestion(preloadedQ);
      setPreloadedQ(null);
      setAppState("studying");
    } else {
      setAppState("generating");
      const q = await fetchOne(topic, lvl.v);
      setQuestion(q);
      setAppState("studying");
    }
  }

  async function submitAnswer() {
    const ok = sel === question.correct;
    setRevealed(true);
    setHistory(h => ({t: h.t+1, c: h.c+(ok?1:0)}));
    saveResponse(question, sel, ok);

    // ─── SHADOW PRE-LOAD STARTS HERE ───
    // While the user is reading the explanation, get the next one ready.
    fetchOne(topic, lvl.v).then(q => setPreloadedQ(q));
  }

  if (!user) return <LandingPage setShowAuth={setShowAuth} />;

  return (
    <div style={{minHeight:"100vh",background:BG}}>
      {/* Nav */}
      <nav style={{padding:"0 5%",height:80,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+BDR,position:"sticky",top:0,background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)",zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setTab("home")}>
          <div style={{width:34,height:34,borderRadius:8,background:NAVY,border:"1px solid "+GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:GOLD}}>M</div>
          <span style={{fontWeight:800,color:"#f1f5f9",fontSize:18}}>MedBoardPro</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          {[{id:"home", i:"🏠", l:"Home"}, {id:"mcq", i:"🎯", l:"QBank"}, {id:"guides", i:"📚", l:"Guides"}].map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} className={tab===t.id?"nav-btn active":"nav-btn"}>
              <span style={{fontSize:20}}>{t.i}</span><span style={{fontSize:11,fontWeight:700}}>{t.l}</span>
            </button>
          ))}
        </div>
        <button onClick={()=>sb.auth.signOut().then(()=>window.location.reload())} style={{color:"#94a3b8", background:"transparent", border:"1px solid #1e293b", padding:"6px 12px", borderRadius:6, cursor:"pointer", fontSize:11}}>Sign Out</button>
      </nav>

      <div style={{padding:"40px 5%",maxWidth:1000,margin:"0 auto"}}>
        {tab==="home" && (
          <div className="fade">
            <h2 style={{fontSize:28,fontWeight:800,marginBottom:28}}>Welcome, Doctor! 👋</h2>
            <div style={{background:"rgba(201,168,76,0.05)",border:"1px solid "+GOLD,borderRadius:16,padding:"24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
               <div style={{display:"flex",gap:40}}>
                  <div><p style={{fontSize:11,color:"#64748b",fontWeight:700}}>ALL-TIME ITEMS</p><div style={{fontSize:22,fontWeight:900}}>{history.t}</div></div>
                  <div><p style={{fontSize:11,color:"#64748b",fontWeight:700}}>ACCURACY</p><div style={{fontSize:22,fontWeight:900,color:"#10b981"}}>{history.t>0?Math.round(history.c/history.t*100)+"%":"—"}</div></div>
               </div>
               <button onClick={()=>setTab("mcq")} style={{background:GOLD,color:"#000",padding:"10px 20px",borderRadius:8,fontWeight:800,border:"none",cursor:"pointer"}}>Start Practice</button>
            </div>
          </div>
        )}

        {tab==="mcq" && (
          <div className="fade">
            {appState==="idle" && <button onClick={handleLoadNext} style={{width:"100%",padding:20,background:NAVY,border:"1px solid "+GOLD,color:"#fff",fontWeight:900,fontSize:18,borderRadius:12,cursor:"pointer"}}>Load Next QBank Item ▶</button>}
            {appState==="generating" && <div style={{textAlign:"center",padding:40}}><div style={{width:40,height:40,border:"4px solid "+GOLD,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 15px"}}></div><p>Consulting Guidelines... (15s)</p></div>}
            
            {question && (
              <div className="fade" style={{background:CARD,padding:30,borderRadius:16,border:"1px solid "+BDR}}>
                <p style={{fontSize:18,lineHeight:1.8,marginBottom:25}}>{question.stem}</p>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {Object.entries(question.choices).map(([k,v]) => (
                    <button key={k} onClick={()=>!revealed && setSel(k)} style={{textAlign:"left",padding:15,borderRadius:10,border:"1px solid "+(revealed? (k===question.correct?"#10b981":k===sel?"#ef4444":BDR) : (k===sel?GOLD:BDR)), background:revealed&&k===question.correct?"rgba(16,185,129,0.1)":"transparent", color:"#fff", cursor:revealed?"default":"pointer"}}>
                      <strong>{k}.</strong> {v}
                    </button>
                  ))}
                </div>
                {!revealed ? <button onClick={submitAnswer} disabled={!sel} style={{marginTop:25,width:"100%",padding:15,background:sel?GOLD:BDR,color:"#000",fontWeight:900,borderRadius:10}}>Submit Answer</button>
                : <div style={{marginTop:25,padding:20,background:"rgba(255,255,255,0.03)",borderRadius:12}}>
                    <p style={{color:GOLD,fontWeight:800,marginBottom:10}}>ATTENDING EXPLANATION</p>
                    <p style={{lineHeight:1.6}}>{question.explanation}</p>
                    <button onClick={handleLoadNext} style={{marginTop:20,width:"100%",padding:12,background:"transparent",border:"1px solid "+GOLD,color:GOLD,fontWeight:800,borderRadius:8}}>Next Item {preloadedQ ? '(Ready)' : '(Pre-loading...)'}</button>
                  </div>}
              </div>
            )}
          </div>
        )}
      </div>

      {showAuth && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
           <button onClick={()=>sb.auth.signInWithOAuth({provider:'google'})} style={{padding:"15px 30px", background:"#fff", borderRadius:10, fontWeight:800, cursor:"pointer"}}>Continue with Google</button>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
