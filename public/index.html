  function startTimer(seconds){
    clearInterval(tRef.current);

      setTLeft(function(t){
        if(t<=1){
          clearInterval(tRef.current);
          finishExam();
          return 0;
        }
        return t-1;
      });
    },1000);

    clearInterval(tRef.current);
    if(examStartTime) setExamDuration(Math.floor((Date.now()-examStartTime)/1000));

      if(!session?.user)return;
      const{data:mcqRows}=await sb.from("mcqs").select("id").eq("stem",question.stem).limit(1);

  async function generate(){
    // Reset all state cleanly
    stopTimer();
    setAppState("generating");
    setQs([]);setSel({});setRev({});setSubmitted({});
    setScore({t:0,c:0});setMcqErr("");setRevealText("");setQNum(0);
    setTLeft(null);setExamDuration(0);setExamStartTime(null);
    setBusy(true);

    const maxAttempts=3;
    let lastError="";

    for(let attempt=0;attempt<maxAttempts;attempt++){
      try{
        if(attempt>0) await new Promise(r=>setTimeout(r,2000));
        const res=await fetch("/.netlify/functions/generate-mcq",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({topic,level:lvl.v,count:1})
        });
        if(!res.ok){
          const e=await res.json().catch(()=>({error:"Server error "+res.status}));
          throw new Error(e.error||"Server error "+res.status);
        }
        const data=await res.json();
        if(!Array.isArray(data))throw new Error("Invalid response");

        setBusy(false);
        saveMcqToDb(data[0]).catch(()=>{});

        // Start timer IMMEDIATELY in exam mode before typewriter
        if(examMode){
          startTimer(SECS);
          setAppState("exam_running");
          setQs(data);  // Show question immediately in exam mode
          return;
        }

        // Study mode: typewriter reveal
        setAppState("studying");
        const words=data[0].stem.split(" ");
        let wi=0;
        setRevealText("");
        const timer=setInterval(function(){
          if(wi>=words.length){
            clearInterval(timer);
            setQs(data);
            setRevealText("");
            return;
          }
          setRevealText(t=>t+(wi===0?"": " ")+words[wi]);
          wi++;
        },15);
        return;
      }catch(e){
        lastError=e.message;
        if((e.message==="Failed to fetch"||e.message.includes("50"))&&attempt<maxAttempts-1){
          setMcqErr("Reconnecting...");
          continue;
        }
        break;
      }
    }
    setBusy(false);
    setAppState("idle");
    setMcqErr("Failed to generate questions: "+lastError);
  }
