                <div style={{display:"flex",gap:10,marginBottom:16}}>
                  <button onClick={()=>setExamMode(false)}
                    style={{flex:1,padding:"12px",borderRadius:10,border:`2px solid ${!examMode?"#10b981":BDR}`,background:!examMode?"rgba(16,185,129,0.08)":"transparent",color:!examMode?"#10b981":"#64748b",fontWeight:700,cursor:"pointer",fontSize:13,lineHeight:1.4}}>
                    📖 Study Mode<br/><span style={{fontSize:11,fontWeight:400,opacity:0.8}}>Untimed · Instant feedback</span>
                  </button>
                  <button onClick={()=>setExamMode(true)}
                    style={{flex:1,padding:"12px",borderRadius:10,border:`2px solid ${examMode?"#ef4444":BDR}`,background:examMode?"rgba(239,68,68,0.08)":"transparent",color:examMode?"#ef4444":"#64748b",fontWeight:700,cursor:"pointer",fontSize:13,lineHeight:1.4}}>
                    ⏱️ Exam Mode<br/><span style={{fontSize:11,fontWeight:400,opacity:0.8}}>90 sec/question · Auto-submit</span>
                  </button>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:14}}>
                  <div>
                    <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>SPECIALTY</label>
                    <select value={grp} onChange={e=>{setGrp(e.target.value);setTopic(GROUPS[e.target.value][0]);}}
                      style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"8px",borderRadius:7,fontSize:13}}>
                      {Object.keys(GROUPS).map(g=><option key={g}>{g}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>TOPIC</label>
                    <select value={topic} onChange={e=>setTopic(e.target.value)}
                      style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"8px",borderRadius:7,fontSize:13}}>
                      {GROUPS[grp].map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:4}}>BOARD LEVEL</label>
                    <select value={lvl.l} onChange={e=>setLvl(LEVELS.find(x=>x.l===e.target.value))}
                      style={{width:"100%",background:"#1e293b",border:`1px solid ${BDR}`,color:"#f1f5f9",padding:"8px",borderRadius:7,fontSize:13}}>
                      {LEVELS.map(x=><option key={x.l}>{x.l}</option>)}
                    </select>
                  </div>
                </div>

                <button onClick={()=>generate(false)} disabled={busy}
                  style={{width:"100%",background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"14px",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:15}}>
                  {examMode?"⏱️ Start Exam Mode →":"⚡ Start Practicing →"}
                </button>
              </div>
            )}

            {/* Loading state */}
            {busy&&(
              <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:14,padding:40,textAlign:"center",marginBottom:18}}>
                <div style={{fontSize:36,marginBottom:16}}>⏳</div>
                <p style={{color:"#64748b",fontSize:15,marginBottom:8}}>Generating your question...</p>
                <p style={{color:"#334155",fontSize:13}}>Powered by AI · ~5 seconds</p>
              </div>
            )}

            {mcqErr&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid #ef4444",borderRadius:9,padding:13,color:"#ef4444",marginBottom:14,fontSize:14}}>{mcqErr}<button onClick={()=>qs.length>0?nextQuestion():generate(true)} style={{marginLeft:12,background:"transparent",border:"1px solid #ef4444",color:"#ef4444",padding:"4px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>Try again</button></div>}

            {/* Session stats bar */}
            {sessionCount>0&&qs.length>0&&(
              <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:10,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#64748b"}}>Questions answered:</span>
                <span style={{fontWeight:800,color:GOLD,fontSize:15}}>{score.t}</span>
                {score.t>0&&<span style={{fontSize:13,color:score.c/score.t>=0.7?"#10b981":"#f59e0b",fontWeight:700}}>{Math.round(score.c/score.t*100)}% correct</span>}
                {examMode&&tActive&&<span style={{fontSize:16,fontWeight:800,color:tLeft<30?"#ef4444":tLeft<60?"#f59e0b":"#10b981",fontFamily:"monospace",marginLeft:"auto"}}>⏱️ {tLeft!==null?fmtT(tLeft):"--:--"}</span>}
                <button onClick={()=>{stopT();setQs([]);setSel({});setRev({});setCurrentQ(0);setTLeft(null);setSessionCount(0);setScore({t:0,c:0,s:0});}}
                  style={{background:"transparent",border:`1px solid ${BDR}`,color:"#475569",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:11,marginLeft:"auto"}}>
                  ✕ End Session
                </button>
              </div>
            )}

            {/* Single question */}
            {qs.length>0&&qs[0]&&!busy&&(()=>{
              try{
              const q=qs[0];
              const i=0;
              const answered=!!rev[i];
              const correct=answered&&sel[i]===q.correct;
              return(
                <div style={{background:CARD,border:`1px solid ${rev[i]?(sel[i]===q.correct?"#10b981":"#ef4444"):BDR}`,borderRadius:13,padding:24,transition:"border-color 0.3s"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
                    <span style={{background:NAVY,border:`1px solid ${GOLD}`,color:GOLD,borderRadius:5,padding:"3px 12px",fontSize:12,fontWeight:700}}>Question {score.t+1}</span>
                    {answered&&q.topic&&<span style={{background:"rgba(99,102,241,0.15)",border:"1px solid rgba(99,102,241,0.3)",color:"#818cf8",borderRadius:20,padding:"2px 10px",fontSize:11}}>{q.topic}</span>}
                    {answered&&<span style={{marginLeft:"auto",fontSize:14,fontWeight:700,color:correct?"#10b981":"#ef4444"}}>{correct?"✓ Correct":"✗ Incorrect"}</span>}
                  </div>

                  <p style={{margin:"0 0 22px",lineHeight:1.9,fontSize:15,color:"#e2e8f0"}}>{q.stem}</p>

                  <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
                    {Object.entries(q.choices).map(([l,t])=>(
                      <button key={l} onClick={()=>{if(!answered)setSel(p=>({...p,[i]:l}));}}
                        style={{textAlign:"left",padding:"13px 16px",borderRadius:9,cursor:answered?"default":"pointer",
                          border:`1px solid ${qColor(i,l)==="transparent"?BDR:qColor(i,l)}`,
                          background:qColor(i,l)==="transparent"?"rgba(255,255,255,0.02)":`${qColor(i,l)}22`,
                          color:answered&&l===q.correct?"#10b981":answered&&sel[i]===l?"#ef4444":"#cbd5e1",
                          fontWeight:sel[i]===l?700:400,fontSize:14,transition:"all 0.2s"}}>
                        <span style={{fontWeight:800,marginRight:10}}>{l}.</span>{t}
                        {answered&&l===q.correct&&<span style={{marginLeft:8,fontSize:12,color:"#10b981"}}>✓ Correct answer</span>}
                        {answered&&sel[i]===l&&l!==q.correct&&<span style={{marginLeft:8,fontSize:12,color:"#ef4444"}}>✗ Your answer</span>}
                      </button>
                    ))}
                  </div>

                  {answered&&(
                    <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${BDR}`,borderRadius:9,padding:16,marginBottom:16}}>
                      <p style={{margin:"0 0 6px",fontSize:12,fontWeight:700,color:GOLD}}>📖 Explanation</p>
                      <p style={{margin:0,color:"#94a3b8",lineHeight:1.8,fontSize:14}}>{q.explanation}</p>
                    </div>
                  )}

                  <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                    {!answered?(
                      <>
                        <button onClick={()=>reveal(i)} disabled={!sel[i]}
                          style={{background:sel[i]?`linear-gradient(135deg,${NAVY},#1a4a9a)`:"#1e293b",border:`1px solid ${sel[i]?GOLD:BDR}`,color:sel[i]?"#fff":"#475569",padding:"11px 32px",borderRadius:8,cursor:sel[i]?"pointer":"not-allowed",fontWeight:700,fontSize:14,transition:"all 0.2s"}}>
                          Submit Answer
                        </button>
                        {!sel[i]&&<span style={{fontSize:13,color:"#334155"}}>Select an answer first</span>}
                      </>
                    ):(
                      <button onClick={nextQuestion} disabled={busy}
                        style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"11px 32px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:14}}>
                        {busy?"⏳ Loading...":"Next Question →"}
                      </button>
                    )}
                  </div>
                </div>
              );}catch(e){return <div style={{color:"#ef4444",padding:20}}>Error displaying question. Please click End Session and try again.</div>;}
            })()}
          </div>
        )}

        {/* GUIDES */}
        {tab==="guides"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4,color:"#f1f5f9"}}>📚 Official Guidelines & Resources</h2>
            <p style={{color:"#475569",marginBottom:18,fontSize:13}}>Direct links to official society guidelines — always current, always free, no paywalls</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:14}}>
              {GUIDES.map(g=>(
                <div key={g.id} style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:12,padding:20,display:"flex",flexDirection:"column",gap:10,transition:"border-color 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=GOLD}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=BDR}>
                  <div style={{fontSize:28}}>{g.i}</div>
                  <div style={{fontWeight:700,fontSize:14,lineHeight:1.4,color:"#f1f5f9"}}>{g.t}</div>
                  <span style={{background:`rgba(201,168,76,0.1)`,border:`1px solid ${GOLD}44`,color:GOLD,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600,alignSelf:"flex-start"}}>{g.s}</span>
                  <a href={g.u} target="_blank" rel="noopener noreferrer"
                    style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"9px",borderRadius:7,fontWeight:600,fontSize:12,textAlign:"center",display:"block",marginTop:"auto"}}>
                    🔗 Open Official Guidelines
                  </a>
                </div>
              ))}
            </div>
            <div style={{background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:10,padding:14,marginTop:16}}>
              <p style={{color:"#818cf8",fontSize:12,margin:0}}>📌 All links go directly to official society websites. Always the most current guidelines — updated by the societies themselves.</p>
            </div>
          </div>
        )}

        {/* PROGRESS */}
        {tab==="progress"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4,color:"#f1f5f9"}}>📊 Your Progress</h2>
            <p style={{color:"#475569",marginBottom:18,fontSize:13}}>Track your board prep performance across all sessions</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:22}}>
              {[{l:"Sessions",v:score.s,i:"📝",c:"#6366f1"},{l:"Questions",v:score.t,i:"❓",c:"#3b82f6"},{l:"Correct",v:score.c,i:"✅",c:"#10b981"},{l:"Accuracy",v:score.t>0?`${Math.round(score.c/score.t*100)}%`:"—",i:"🎯",c:GOLD}].map(s=>(
                <div key={s.l} style={{background:CARD,border:`1px solid ${s.c}44`,borderRadius:12,padding:18,textAlign:"center"}}>
                  <div style={{fontSize:24,marginBottom:7}}>{s.i}</div>
                  <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:11,color:"#475569",marginTop:3}}>{s.l}</div>
                </div>
              ))}
            </div>
            {score.t===0?(
              <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:12,padding:36,textAlign:"center"}}>
                <div style={{fontSize:44,marginBottom:12}}>🎯</div>
                <h3 style={{fontWeight:700,marginBottom:8,color:"#f1f5f9"}}>No questions answered yet</h3>
                <p style={{color:"#475569",fontSize:13,marginBottom:16}}>Start the MCQ generator to begin tracking your progress!</p>
                <button onClick={()=>setTab("mcq")} style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"11px 24px",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>Generate Questions →</button>
              </div>
            ):(
              <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:12,padding:22}}>
                <h3 style={{fontWeight:700,marginBottom:14,fontSize:15,color:"#f1f5f9"}}>Performance Summary</h3>
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:13,color:"#94a3b8"}}>Overall accuracy</span>
                    <span style={{fontSize:13,fontWeight:700,color:GOLD}}>{Math.round(score.c/score.t*100)}%</span>
                  </div>
                  <div style={{height:10,background:"#1e293b",borderRadius:5,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.round(score.c/score.t*100)}%`,background:`linear-gradient(90deg,${NAVY},${GOLD})`,borderRadius:5,transition:"width 0.4s"}}/>
                  </div>
                </div>
                <p style={{color:"#475569",fontSize:13,lineHeight:1.6}}>
                  {score.c/score.t>=0.8?"🏆 Excellent! You are well prepared for boards.":score.c/score.t>=0.6?"📈 Good progress! Keep practicing your weak areas.":"💪 Keep going! Consistent practice leads to board success."}
                </p>
              </div>
            )}
          </div>
        )}

        {/* DEFI */}
        {tab==="defi"&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4,color:"#f1f5f9"}}>💰 DeFi Yield Tracker</h2>
            <p style={{color:"#475569",marginBottom:12,fontSize:13}}>Live yields across Ethereum, Solana, Arbitrum, Polygon & BNB Chain — powered by DeFiLlama</p>
            <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:9,padding:"9px 14px",marginBottom:16,fontSize:12,color:"#fca5a5",lineHeight:1.6}}>
              ⚠️ <strong>Educational tool only.</strong> DeFi carries real financial risk including smart contract exploits and potential total loss. Higher APY = higher risk. Not financial advice.
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              {["All","Ethereum","Arbitrum","Solana","Polygon","BSC"].map(c=>(
                <button key={c} onClick={()=>setDChain(c)} style={{padding:"6px 14px",border:`1px solid ${dChain===c?GOLD:BDR}`,borderRadius:20,cursor:"pointer",background:dChain===c?`rgba(201,168,76,0.15)`:"transparent",color:dChain===c?GOLD:"#64748b",fontSize:12,fontWeight:600}}>{c}</button>
              ))}
              <button onClick={fetchDefi} style={{marginLeft:"auto",background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"6px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600}}>🔄 Refresh</button>
            </div>
            {dBusy&&<div style={{textAlign:"center",padding:"36px",color:"#475569"}}>⏳ Fetching live yield data from DeFiLlama...</div>}
            {dErr&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid #ef4444",borderRadius:9,padding:14,color:"#ef4444"}}>{dErr}</div>}
            {!dBusy&&!dErr&&!pools.length&&(
              <div style={{textAlign:"center",padding:"36px",color:"#475569"}}>
                <div style={{fontSize:36,marginBottom:10}}>💰</div>
                <p style={{marginBottom:14,fontSize:14}}>Click Refresh to load live yield data</p>
                <button onClick={fetchDefi} style={{background:`linear-gradient(135deg,${NAVY},#1a4a9a)`,border:`1px solid ${GOLD}`,color:"#fff",padding:"11px 22px",borderRadius:9,cursor:"pointer",fontWeight:600,fontSize:13}}>Load Live Data</button>
              </div>
            )}
            {!dBusy&&pools.filter(p=>dChain==="All"||p.chain===dChain).slice(0,50).map(p=>(
              <div key={p.id} style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:11,padding:"13px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",marginBottom:9,transition:"border-color 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=GOLD}
                onMouseLeave={e=>e.currentTarget.style.borderColor=BDR}>
                <div style={{width:9,height:9,borderRadius:"50%",background:cC(p.chain),flexShrink:0}}/>
                <div style={{flex:2,minWidth:130}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#f1f5f9"}}>{p.sym}</div>
                  <div style={{fontSize:10,color:"#475569"}}>{p.proj} · {p.chain}</div>
                </div>
                <div style={{textAlign:"center",minWidth:65}}>
                  <div style={{fontSize:16,fontWeight:800,color:p.apy>20?"#f59e0b":"#10b981"}}>{fAPY(p.apy)}</div>
                  <div style={{fontSize:9,color:"#475569"}}>APY</div>
                </div>
                <div style={{textAlign:"center",minWidth:65}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>{fTVL(p.tvl)}</div>
                  <div style={{fontSize:9,color:"#475569"}}>TVL</div>
                </div>
                <span style={{background:`${rC(p.risk)}22`,border:`1px solid ${rC(p.risk)}`,color:rC(p.risk),borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>{p.risk}</span>
                <button onClick={()=>setWl(w=>w.includes(p.id)?w.filter(x=>x!==p.id):[...w,p.id])}
                  style={{background:"transparent",border:`1px solid ${wl.includes(p.id)?GOLD:BDR}`,color:wl.includes(p.id)?GOLD:"#475569",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:13}}>
                  {wl.includes(p.id)?"⭐":"☆"}
                </button>
              </div>
            ))}
          </div>
        )}

      </div>
      <div style={{textAlign:"center",padding:"16px",color:"#1e293b",fontSize:11,borderTop:`1px solid ${BDR}`}}>
        MedBoard Pro · Anteneh Zenebe, MD, FACE · Howard University College of Medicine · antenehzenebe@gmail.com
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
