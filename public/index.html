const TOPIC_GROUPS = {
  "🎲 Random":["Random — All Specialties","Random — Endocrinology Only","Random — ABIM IM Blueprint","Random — USMLE High-Yield"],
  "🩺 Diabetes":["Type 2 — Diagnosis & Management","Type 1 — Insulin Therapy","DKA & HHS","Hypoglycemia","Microvascular Complications","Macrovascular Complications","Gestational Diabetes","LADA & MODY","CGM & AID Systems","GLP-1 Receptor Agonists","SGLT2 Inhibitors","Inpatient Glycemic Management"],
  "🦋 Thyroid":["Hypothyroidism & Hashimoto's","Hyperthyroidism & Graves'","Thyroid Storm","Thyroid Nodule Evaluation","Thyroid Cancer","Thyroid in Pregnancy","Subacute Thyroiditis"],

  "🫄 GI & Hepatology":["IBD — Crohn's & UC","Cirrhosis & Portal HTN","Hepatitis B & C","GI Bleeding","Acute Pancreatitis","NAFLD/NASH"],
  "🧠 Neurology":["Ischemic Stroke","Seizures & Epilepsy","Multiple Sclerosis","Meningitis","Parkinson's Disease","Headache Disorders"],

  "💊 Pharmacology":["Antibiotic Classes","Cardiovascular Drugs","Diabetes Medications","Anticoagulants","Immunosuppressants","Drug Interactions"],
  "📋 USMLE Step 3":["Foundations of Independent Practice","Ambulatory Medicine","Biostatistics & Epidemiology","Patient Safety","CCS Cases — Endocrinology","CCS Cases — Mixed Systems"],
  "⚖️ Ethics":["Informed Consent","Advance Directives","End-of-Life Care","Medical Error Disclosure","Health Disparities","High-Value Care"],
};

const LEVELS = [
  {label:"USMLE Step 1",value:"USMLE Step 1 (M2 medical students, basic science focus)"},
  {label:"USMLE Step 2 CK",value:"USMLE Step 2 CK (M3/M4 students, clinical decision-making)"},
  {label:"USMLE Step 3",value:"USMLE Step 3 (PGY-1/2 residents, clinical management and CCS)"},
  {label:"ABIM Internal Medicine",value:"ABIM Internal Medicine boards (residents, broad clinical management)"},
  {label:"ABIM Endocrinology",value:"ABIM Endocrinology & Metabolism subspecialty boards (fellows)"},
];

const STUDY_GUIDES = [
  {id:1,title:"ADA Standards of Medical Care in Diabetes",specialty:"Endocrinology",icon:"📊",url:"https://diabetesjournals.org/care/issue/47/Supplement_1"},
  {id:2,title:"Endocrine Society Clinical Practice Guidelines",specialty:"Endocrinology",icon:"🔬",url:"https://www.endocrine.org/clinical-practice-guidelines"},
  {id:3,title:"AACE Diabetes Management Guidelines",specialty:"Endocrinology",icon:"🩺",url:"https://www.aace.com/publications/guidelines"},
  {id:4,title:"ACC/AHA Cardiovascular Guidelines",specialty:"Cardiology",icon:"🫀",url:"https://www.acc.org/guidelines"},
  {id:5,title:"KDIGO Kidney Disease Guidelines",specialty:"Nephrology",icon:"🫘",url:"https://kdigo.org/guidelines"},
  {id:6,title:"USPSTF Preventive Care Recommendations",specialty:"Preventive",icon:"✅",url:"https://www.uspreventiveservicestaskforce.org/uspstf/recommendation-topics"},
  {id:7,title:"ESC Cardiovascular Guidelines",specialty:"Cardiology",icon:"🏥",url:"https://www.escardio.org/Guidelines"},
  {id:8,title:"EASD Diabetes Management Guidelines",specialty:"Endocrinology",icon:"🦋",url:"https://www.easd.eu/guidelines"},
  {id:9,title:"IDSA Infectious Disease Guidelines",specialty:"ID",icon:"🦠",url:"https://www.idsociety.org/practice-guideline/alphabetical-guidelines"},
  {id:10,title:"NCCN Oncology Guidelines",specialty:"Oncology",icon:"🎗",url:"https://www.nccn.org/guidelines/guidelines-detail"},
  {id:11,title:"ACR Rheumatology Guidelines",specialty:"Rheumatology",icon:"🦴",url:"https://www.rheumatology.org/Practice-Quality/Clinical-Support/Clinical-Practice-Guidelines"},
  {id:12,title:"ATS/ERS Respiratory Guidelines",specialty:"Pulmonology",icon:"🫁",url:"https://www.thoracic.org/statements"},
];

function App() {
  const [authView, setAuthView] = React.useState("login");
  const [user, setUser] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [name, setName] = React.useState("");
  const [authError, setAuthError] = React.useState("");
  const [authLoading, setAuthLoading] = React.useState(false);
  const [activeTab, setActiveTab] = React.useState("dashboard");
  const [resetSent, setResetSent] = React.useState(false);

  // MCQ state
  const [selGroup, setSelGroup] = React.useState("🎲 Random");
  const [topic, setTopic] = React.useState("Random — All Specialties");
  const [level, setLevel] = React.useState(LEVELS[3]);
  const [count, setCount] = React.useState(5);
  const [examMode, setExamMode] = React.useState(false);
  const [timeLeft, setTimeLeft] = React.useState(null);
  const [timerActive, setTimerActive] = React.useState(false);
  const [questions, setQuestions] = React.useState([]);
  const [mcqLoading, setMcqLoading] = React.useState(false);
  const [mcqError, setMcqError] = React.useState("");
  const [selAnswer, setSelAnswer] = React.useState({});
  const [revealed, setRevealed] = React.useState({});
  const [scores, setScores] = React.useState({total:0,correct:0,sessions:0});
  const timerRef = React.useRef(null);

  // DeFi state
  const [pools, setPools] = React.useState([]);
  const [defiLoading, setDefiLoading] = React.useState(false);
  const [defiError, setDefiError] = React.useState("");
  const [defiChain, setDefiChain] = React.useState("All");
  const [watchlist, setWatchlist] = React.useState([]);

  // ── CHECK SESSION ON LOAD ──────────────────
  React.useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  // ── AUTH FUNCTIONS ─────────────────────────
  const login = async () => {
    setAuthError(""); setAuthLoading(true);
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) setAuthError(error.message);
    setAuthLoading(false);
  };

  const signup = async () => {
    setAuthError(""); setAuthLoading(true);
    if (password.length < 8) { setAuthError("Password must be at least 8 characters"); setAuthLoading(false); return; }
    const { error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    if (error) setAuthError(error.message);
    else setAuthError("✅ Check your email to confirm your account, then sign in!");
    setAuthLoading(false);
  };

  const googleLogin = async () => {
    setAuthLoading(true);
    const { error } = await supabase.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.href }
    });
    if (error) setAuthError(error.message);
    setAuthLoading(false);
  };

  const logout = async () => {
    await supabase.auth.signOut();
    setUser(null);
  };

  const resetPassword = async () => {
    if (!email) { setAuthError("Enter your email above first"); return; }
    const { error } = await supabase.auth.resetPasswordForEmail(email);
    if (error) setAuthError(error.message);
    else setResetSent(true);
  };

  // ── MCQ FUNCTIONS ──────────────────────────
  const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const stopTimer = () => { clearInterval(timerRef.current); setTimerActive(false); };

  const autoRevealAll = React.useCallback((qs) => {
    setRevealed(prev => {
      const next = {...prev};
      qs.forEach((_,i) => { next[i] = true; });
      return next;
    });
  }, []);

  const startTimer = (total, qs) => {
    const secs = total * SECS_PER_Q;
    setTimeLeft(secs);
    setTimerActive(true);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(timerRef.current); setTimerActive(false); autoRevealAll(qs); return 0; }
        return t - 1;
      });
    }, 1000);
  };

  const generateMCQ = async () => {
    stopTimer();
    setMcqLoading(true); setMcqError(""); setQuestions([]); setSelAnswer({}); setRevealed({}); setTimeLeft(null);
    const isRandom = topic.toLowerCase().includes("random");
    const topicPrompt = isRandom
      ? topic.includes("Endocrinology") ? "a randomly selected endocrinology topic"
        : topic.includes("ABIM IM") ? "a randomly selected ABIM Internal Medicine blueprint topic"
        : topic.includes("USMLE") ? "a randomly selected high-yield USMLE topic"
        : "a randomly selected topic from any medical specialty"
      : `"${topic}"`;

    const prompt = `You are a senior medical educator and board examiner. Generate exactly ${count} high-quality board-style MCQ(s) on ${topicPrompt} at ${level.value} level.

Use the most current guidelines from ADA, AACE, Endocrine Society, ACC/AHA, ESC, EASD, KDIGO, IDSA, NCCN, USPSTF and all major US and European medical societies. Reference top textbooks including Harrison's Principles of Internal Medicine, Williams Textbook of Endocrinology, DeGroot's Endocrinology, Braunwald's Heart Disease, and other relevant specialty textbooks. Use evidence from recent years — not limited to any single year.

Each question must:
- Be a realistic clinical vignette with patient demographics, presenting complaint, relevant labs and vitals
- Have exactly 5 answer choices labeled A through E
- Have one definitively correct answer
- Include a detailed explanation (3-5 sentences) citing the specific guideline, society or textbook
- Vary in difficulty
${isRandom ? "- Each question must be from a DIFFERENT specialty or topic" : ""}

Return ONLY a valid JSON array, no markdown:
[{"stem":"...","choices":{"A":"...","B":"...","C":"...","D":"...","E":"..."},"correct":"B","explanation":"...citing guideline/textbook...","topic":"topic name"}]`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]}),
      });
      const data = await res.json();
      const raw = data.content?.map(b=>b.text||"").join("").trim();
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setQuestions(parsed);
      setScores(s=>({...s,sessions:s.sessions+1}));
      if (examMode) startTimer(parsed.length, parsed);
    } catch(e) {
      setMcqError("Question generation requires a backend API key. This will be fully activated once your Netlify Function is deployed. Stay tuned — next step!");
    }
    setMcqLoading(false);
  };

  const revealAnswer = (qi) => {
    if (!selAnswer[qi]) return;
    const ok = selAnswer[qi] === questions[qi].correct;
    setRevealed(p=>({...p,[qi]:true}));
    setScores(s=>({total:s.total+1,correct:s.correct+(ok?1:0),sessions:s.sessions}));
  };

  const fetchDefi = async () => {
    setDefiLoading(true); setDefiError("");
    try {
      const res = await fetch("https://yields.llama.fi/pools");
      const data = await res.json();
      const CHAINS = ["Ethereum","Arbitrum","Solana","Polygon","BSC"];
      const filtered = data.data
        .filter(p=>p.tvlUsd>=1_000_000&&p.apy>0&&p.apy<300&&CHAINS.some(c=>p.chain?.toLowerCase().includes(c.toLowerCase())))
        .map(p=>({id:p.pool,project:p.project,symbol:p.symbol,
          chain:CHAINS.find(c=>p.chain?.toLowerCase().includes(c.toLowerCase()))||p.chain,
          apy:p.apy,tvl:p.tvlUsd,
          risk:p.apy>40||p.tvlUsd<1e6?"High":p.apy>15?"Medium":"Low"}))
        .sort((a,b)=>b.apy-a.apy).slice(0,200);
      setPools(filtered);
    } catch(e) { setDefiError("Could not load live data. Try again."); }
    setDefiLoading(false);
  };

  const fmtAPY = n=>`${n.toFixed(2)}%`;
  const fmtTVL = n=>n>=1e9?`$${(n/1e9).toFixed(2)}B`:n>=1e6?`$${(n/1e6).toFixed(1)}M`:`$${(n/1e3).toFixed(0)}K`;
  const riskColor = r=>r==="Low"?"#10b981":r==="Medium"?"#f59e0b":"#ef4444";
  const chainColor = c=>({"Ethereum":"#627EEA","Arbitrum":"#28A0F0","Solana":"#9945FF","Polygon":"#8247E5","BSC":"#F3BA2F"}[c]||"#64748b");
  const choiceColor = (qi,l)=>{
    if(!revealed[qi]) return selAnswer[qi]===l?HU_GOLD:"transparent";
    if(l===questions[qi].correct) return "#10b981";
    if(selAnswer[qi]===l) return "#ef4444";
    return "transparent";
  };

  const sessionScore = Object.entries(revealed).filter(([i])=>questions[i]&&selAnswer[i]===questions[i].correct).length;
  const sessionTotal = Object.keys(revealed).length;
  const userName = user?.user_metadata?.full_name || user?.email?.split("@")[0] || "Doctor";

  const NavBtn = ({id,label,icon}) => (
    <button onClick={()=>{setActiveTab(id);if(id==="defi"&&pools.length===0)fetchDefi();}}
      style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 14px",border:"none",borderRadius:8,cursor:"pointer",
        background:activeTab===id?`rgba(201,168,76,0.12)`:"transparent",
        borderBottom:activeTab===id?`2px solid ${HU_GOLD}`:"2px solid transparent",
        color:activeTab===id?HU_GOLD:"#64748b",fontWeight:600,fontSize:11}}>
      <span style={{fontSize:18}}>{icon}</span>{label}
    </button>
  );

  // ── LOADING ────────────────────────────────
  if (loading) return (
    <div style={{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:12,background:`linear-gradient(135deg,${HU_NAVY},#1a3a7a)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:22,color:HU_GOLD,margin:"0 auto 16px"}}>M</div>
        <p style={{color:"#475569"}}>Loading MedBoard Pro...</p>
      </div>
    </div>
  );

  // ── AUTH SCREEN ────────────────────────────
  if (!user) return (
    <div style={{background:BG,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:52,height:52,borderRadius:12,background:`linear-gradient(135deg,${HU_NAVY},#1a3a7a)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:22,color:HU_GOLD,margin:"0 auto 14px"}}>M</div>
          <h1 style={{fontSize:22,fontWeight:800,margin:0,color:"#f1f5f9"}}>MedBoard <span style={{color:HU_GOLD}}>Pro</span></h1>
          <p style={{color:"#475569",fontSize:13,marginTop:4}}>AI-Powered Medical Board Prep · Howard University</p>
        </div>

        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:20,padding:28}}>
          <h2 style={{fontSize:18,fontWeight:800,marginBottom:20,textAlign:"center",color:"#f1f5f9"}}>
            {authView==="login"?"Sign In to Your Account":"Create Your Account"}
          </h2>

          {/* Google */}
          <button onClick={googleLogin} disabled={authLoading}
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid ${BORDER}`,color:"#f1f5f9",padding:"11px",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:14,marginBottom:18,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <span style={{fontWeight:800,color:"#4285f4",fontSize:16}}>G</span> Continue with Google
          </button>

          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
            <div style={{flex:1,height:1,background:BORDER}}/><span style={{color:"#334155",fontSize:12}}>or</span><div style={{flex:1,height:1,background:BORDER}}/>
          </div>

          {authView==="signup"&&(
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:5}}>FULL NAME</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Dr. John Smith"
                style={{width:"100%",background:"#1e293b",border:`1px solid ${BORDER}`,color:"#f1f5f9",padding:"11px 13px",borderRadius:8,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
          )}

          <div style={{marginBottom:14}}>
            <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:5}}>EMAIL</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="doctor@hospital.com"
              style={{width:"100%",background:"#1e293b",border:`1px solid ${BORDER}`,color:"#f1f5f9",padding:"11px 13px",borderRadius:8,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>

          <div style={{marginBottom:18}}>
            <label style={{fontSize:11,color:"#64748b",fontWeight:700,display:"block",marginBottom:5}}>PASSWORD</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Minimum 8 characters"
              style={{width:"100%",background:"#1e293b",border:`1px solid ${BORDER}`,color:"#f1f5f9",padding:"11px 13px",borderRadius:8,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>

          {authError&&(
            <div style={{background:authError.startsWith("✅")?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)",border:`1px solid ${authError.startsWith("✅")?"#10b981":"#ef4444"}`,borderRadius:8,padding:"10px 13px",color:authError.startsWith("✅")?"#10b981":"#ef4444",fontSize:13,marginBottom:14}}>
              {authError}
            </div>
          )}

          {resetSent&&(
            <div style={{background:"rgba(16,185,129,0.1)",border:"1px solid #10b981",borderRadius:8,padding:"10px 13px",color:"#10b981",fontSize:13,marginBottom:14}}>
              ✅ Password reset email sent! Check your inbox.
            </div>
          )}

          <button onClick={authView==="login"?login:signup} disabled={authLoading}
            style={{width:"100%",background:`linear-gradient(135deg,${HU_NAVY},#1a4a9a)`,border:`1px solid ${HU_GOLD}`,color:"#fff",padding:"12px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:15,marginBottom:12,opacity:authLoading?0.7:1}}>
            {authLoading?"Please wait...":authView==="login"?"Sign In →":"Create Account →"}
          </button>

          {authView==="login"&&(
            <p style={{textAlign:"center",marginBottom:12}}>
              <span onClick={resetPassword} style={{color:"#475569",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Forgot password?</span>
            </p>
          )}

          <p style={{textAlign:"center",color:"#475569",fontSize:13,margin:0}}>
            {authView==="login"?"Don't have an account? ":"Already have an account? "}
            <span onClick={()=>{setAuthView(authView==="login"?"signup":"login");setAuthError("");}} style={{color:HU_GOLD,cursor:"pointer",fontWeight:600}}>
              {authView==="login"?"Sign Up":"Sign In"}
            </span>
          </p>
        </div>
        <p style={{textAlign:"center",color:"#1e293b",fontSize:11,marginTop:16}}>MedBoard Pro · Anteneh Zenebe, MD, FACE · Howard University</p>
      </div>
    </div>
  );

  // ── MAIN DASHBOARD ─────────────────────────
  return (
    <div style={{background:BG,minHeight:"100vh"}}>
      <nav style={{background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${BORDER}`,padding:"0 4%",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,borderRadius:7,background:`linear-gradient(135deg,${HU_NAVY},#1a3a7a)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:HU_GOLD}}>M</div>
            <span style={{fontWeight:700,fontSize:16,color:"#f1f5f9"}}>MedBoard <span style={{color:HU_GOLD}}>Pro</span></span>
          </div>
          <div style={{display:"flex",gap:2}}>

            {!defiLoading&&!defiError&&pools.length===0&&(
              <div style={{textAlign:"center",padding:"36px",color:"#475569"}}>
                <div style={{fontSize:36,marginBottom:10}}>💰</div>
                <p style={{marginBottom:12}}>Click Refresh to load live yield data</p>
                <button onClick={fetchDefi} style={{background:`linear-gradient(135deg,${HU_NAVY},#1a4a9a)`,border:`1px solid ${HU_GOLD}`,color:"#fff",padding:"11px 22px",borderRadius:9,cursor:"pointer",fontWeight:600,fontSize:13}}>Load Live Data</button>
              </div>
            )}
            {!defiLoading&&pools.filter(p=>defiChain==="All"||p.chain===defiChain).slice(0,50).map(p=>(
              <div key={p.id} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:11,padding:"13px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",marginBottom:9,transition:"border-color 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=HU_GOLD}
                onMouseLeave={e=>e.currentTarget.style.borderColor=BORDER}>
                <div style={{width:9,height:9,borderRadius:"50%",background:chainColor(p.chain),flexShrink:0}}/>
                <div style={{flex:2,minWidth:130}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#f1f5f9"}}>{p.symbol}</div>
                  <div style={{fontSize:10,color:"#475569"}}>{p.project} · {p.chain}</div>
                </div>
                <div style={{textAlign:"center",minWidth:65}}>
                  <div style={{fontSize:16,fontWeight:800,color:p.apy>20?"#f59e0b":"#10b981"}}>{fmtAPY(p.apy)}</div>
                  <div style={{fontSize:9,color:"#475569"}}>APY</div>
                </div>
                <div style={{textAlign:"center",minWidth:65}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#94a3b8"}}>{fmtTVL(p.tvl)}</div>
                  <div style={{fontSize:9,color:"#475569"}}>TVL</div>
                </div>
                <span style={{background:`${riskColor(p.risk)}22`,border:`1px solid ${riskColor(p.risk)}`,color:riskColor(p.risk),borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700}}>{p.risk}</span>
                <button onClick={()=>setWatchlist(w=>w.includes(p.id)?w.filter(x=>x!==p.id):[...w,p.id])}
                  style={{background:"transparent",border:`1px solid ${watchlist.includes(p.id)?HU_GOLD:BORDER}`,color:watchlist.includes(p.id)?HU_GOLD:"#475569",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:13}}>
                  {watchlist.includes(p.id)?"⭐":"☆"}
                </button>
              </div>
            ))}
          </div>
        )}

      </div>
      <div style={{textAlign:"center",padding:"16px",color:"#1e293b",fontSize:11,borderTop:`1px solid ${BORDER}`}}>
        MedBoard Pro · Anteneh Zenebe, MD, FACE · Howard University College of Medicine · antenehzenebe@gmail.com
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
