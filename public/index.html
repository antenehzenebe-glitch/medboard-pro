button,select,input{font-family:inherit}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
async function saveResponse(question, choice, isCorrect) {
  const {data:{session}} = await sb.auth.getSession();
  if (!session) return;
  const mcqRes = await sb.from("mcqs").select("id").eq("stem", question.stem).limit(1);
  const mcqId = mcqRes.data?.[0]?.id;
  if (!mcqId) return;
  await sb.from("user_responses").insert({ user_id: session.user.id, mcq_id: mcqId, selected_choice: choice, is_correct: isCorrect });
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = React.useState(null);
  const [tab, setTab] = React.useState("home");
  const [topic, setTopic] = React.useState("DKA and HHS");
  const [lvl, setLvl] = React.useState(LEVELS[3]);
  const [appState, setAppState] = React.useState("idle");
  const [question, setQuestion] = React.useState(null);
  const [preloadedQ, setPreloadedQ] = React.useState(null);
  const [sel, setSel] = React.useState("");
  const [revealed, setRevealed] = React.useState(false);
  const [history, setHistory] = React.useState({t:0, c:0});
  const [showAuth, setShowAuth] = React.useState(false);
  const [sidebarOpen, setSidebarOpen] = React.useState(false);

  React.useEffect(() => {
    sb.auth.getSession().then(res => {
      if(res.data.session) { setUser(res.data.session.user); fetchHistory(res.data.session.user.id); }
    });
  }, []);

  async function fetchHistory(uid) {
    const {data} = await sb.from("user_responses").select("is_correct").eq("user_id", uid);
    if(data) setHistory({t: data.length, c: data.filter(r => r.is_correct).length});
  }

  async function fetchOne(targetTopic, targetLvl) {
    const {data: bank} = await sb.from("mcqs").select("*").eq("topic", targetTopic).eq("exam_level", targetLvl).limit(10);
    if (bank?.length > 0) return bank[Math.floor(Math.random() * bank.length)];
    const res = await fetch("/.netlify/functions/generate-mcq", { method: "POST", body: JSON.stringify({topic: targetTopic, level: targetLvl}) });
    const items = await res.json();
    return items[0];
  }

  async function handleLoadNext() {
    setSel(""); setRevealed(false);
    if (preloadedQ) { setQuestion(preloadedQ); setPreloadedQ(null); setAppState("studying"); }
    else { setAppState("generating"); const q = await fetchOne(topic, lvl.v); setQuestion(q); setAppState("studying"); }
  }

  async function submitAnswer() {
    const ok = sel === question.correct;
    setRevealed(true);
    setHistory(h => ({t: h.t+1, c: h.c+(ok?1:0)}));
    saveResponse(question, sel, ok);
    fetchOne(topic, lvl.v).then(q => setPreloadedQ(q));
  }

  if (!user) return <LandingPage setShowAuth={setShowAuth} />;

  return (
    <div style={{minHeight:"100vh",background:BG}}>
      <nav style={{padding:"0 5%",height:80,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+BDR,position:"sticky",top:0,background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)",zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setTab("home")}>
          <div style={{width:34,height:34,borderRadius:8,background:NAVY,border:"1px solid "+GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:GOLD}}>M</div>
          <span style={{fontWeight:800,color:"#f1f5f9",fontSize:18, display:window.innerWidth>600?"block":"none"}}>MedBoardPro</span>
        </div>
        
        <div style={{display:"flex",gap:8, alignItems:"flex-end", height:"100%"}}>
          {[{id:"home", i:"🏠", l:"Home"}, {id:"mcq", i:"🎯", l:"QBank"}, {id:"guides", i:"📚", l:"Guides"}, {id:"progress", i:"📊", l:"Progress"}].map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} className={tab===t.id?"nav-btn active":"nav-btn"} style={{height:"100%", justifyContent:"center"}}>
              <span style={{fontSize:20}}>{t.i}</span><span style={{fontSize:11,fontWeight:700}}>{t.l}</span>
            </button>
          ))}
        </div>

        <div style={{display:"flex", alignItems:"center", gap:12}}>
           <div style={{textAlign:"right", display:window.innerWidth>900?"block":"none"}}>
              <div style={{fontSize:12, fontWeight:800}}>{user.user_metadata?.full_name || "Doctor"}</div>
              <div style={{fontSize:10, color:"#64748b"}}>{user.email}</div>
           </div>
           <button onClick={()=>window.open(PORTAL_URL,"_blank")} className="gold-outline-btn">💳 Manage Plan</button>
           <button onClick={()=>window.open(PORTAL_URL,"_blank")} className="gold-outline-btn">🔄 Change Plan</button>
           <button onClick={()=>sb.auth.signOut().then(()=>window.location.reload())} style={{color:"#94a3b8", background:"transparent", border:"1px solid #1e293b", padding:"6px 12px", borderRadius:6, cursor:"pointer", fontSize:11}}>Sign Out</button>
        </div>
      </nav>

      <div style={{padding:"40px 5%",maxWidth:1000,margin:"0 auto"}}>
        {tab==="home" && (
          <div className="fade">
            <h2 style={{fontSize:28,fontWeight:800,marginBottom:8}}>Welcome back, {user.user_metadata?.full_name?.split(" ")[0] || "Doctor"}! 👋</h2>
            <p style={{color:"#64748b", fontSize:14, marginBottom:28}}>Howard University College of Medicine · Academic Dashboard</p>
            
            <div style={{background:"rgba(201,168,76,0.05)",border:"1px solid "+GOLD,borderRadius:16,padding:"24px",display:"flex",justifyContent:"space-between",alignItems:"center", marginBottom:32}}>
               <div style={{display:"flex",gap:40}}>
                  <div><p style={{fontSize:11,color:"#64748b",fontWeight:700}}>ALL-TIME ITEMS</p><div style={{fontSize:22,fontWeight:900}}>{history.t}</div></div>
                  <div><p style={{fontSize:11,color:"#64748b",fontWeight:700}}>ACCURACY</p><div style={{fontSize:22,fontWeight:900,color:"#10b981"}}>{history.t>0?Math.round(history.c/history.t*100)+"%":"—"}</div></div>
               </div>
               <button onClick={()=>setTab("mcq")} style={{background:GOLD,color:"#000",padding:"10px 20px",borderRadius:8,fontWeight:800,border:"none",cursor:"pointer"}}>Start Practice Session</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:16}}>
               <div className="quick-card" onClick={()=>setTab("mcq")}><h3>🎯 Premium QBank</h3><p style={{color:"#64748b", fontSize:13}}>Case-based board review</p></div>
               <div className="quick-card" onClick={()=>setTab("guides")}><h3>📚 Guidelines</h3><p style={{color:"#64748b", fontSize:13}}>ATA, ADA, Endocrine Society</p></div>
               <div className="quick-card" onClick={()=>setTab("progress")}><h3>📊 Performance</h3><p style={{color:"#64748b", fontSize:13}}>Weakness and accuracy tracking</p></div>
            </div>
          </div>
        )}

        {tab==="mcq" && (
          <div className="fade">
            <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{width:"100%",padding:12,background:CARD,border:"1px solid "+BDR,borderRadius:8,color:GOLD,fontWeight:700,marginBottom:15,cursor:"pointer", textAlign:"left"}}>⚙ Settings: {topic} ({lvl.l})</button>
            
            {sidebarOpen && (
              <div style={{background:CARD,padding:20,borderRadius:12,marginBottom:20}}>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>{LEVELS.map(l=><button key={l.v} onClick={()=>setLvl(l)} style={{padding:"6px 12px",borderRadius:6,border:"1px solid "+(lvl.v===l.v?GOLD:BDR),background:lvl.v===l.v?GOLD:"transparent",color:lvl.v===l.v?"#000":"#fff"}}>{l.l}</button>)}</div>
                <div style={{maxHeight:300,overflowY:"auto"}}>{Object.entries(GROUPS).map(([g,ts])=><div key={g}><p style={{fontSize:11,color:GOLD,marginTop:10, fontWeight:800}}>{g}</p><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{ts.map(t=><button key={t} onClick={()=>{setTopic(t);setSidebarOpen(false)}} style={{fontSize:11,padding:5,background:"rgba(255,255,255,0.05)",border:"1px solid "+BDR,color:"#fff", cursor:"pointer"}}>{t}</button>)}</div></div>)}</div>
                <LabPanel />
              </div>
            )}

            {appState==="idle" && <button onClick={handleLoadNext} style={{width:"100%",padding:20,background:NAVY,border:"1px solid "+GOLD,color:"#fff",fontWeight:900,fontSize:18,borderRadius:12,cursor:"pointer"}}>Load Next QBank Item ▶</button>}
            {appState==="generating" && <div style={{textAlign:"center",padding:40}}><div style={{width:40,height:40,border:"4px solid "+GOLD,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 15px"}}></div><p>Consulting Academic Guidelines... (15s)</p></div>}
            
            {question && (
              <div className="fade" style={{background:CARD,padding:30,borderRadius:16,border:"1px solid "+BDR}}>
                <p style={{fontSize:18,lineHeight:1.8,marginBottom:25}}>{question.stem}</p>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {Object.entries(question.choices).map(([k,v]) => (
                    <button key={k} onClick={()=>!revealed && setSel(k)} style={{textAlign:"left",padding:15,borderRadius:10,border:"1px solid "+(revealed? (k===question.correct?"#10b981":k===sel?"#ef4444":BDR) : (k===sel?GOLD:BDR)), background:revealed&&k===question.correct?"rgba(16,185,129,0.1)":"transparent", color:"#fff", cursor:revealed?"default":"pointer"}}>
                      <strong>{k}.</strong> {v}
                    </button>
                  ))}
                </div>
                {!revealed ? <button onClick={submitAnswer} disabled={!sel} style={{marginTop:25,width:"100%",padding:15,background:sel?GOLD:BDR,color:"#000",fontWeight:900,borderRadius:10}}>Submit Answer</button>
                : <div style={{marginTop:25,padding:20,background:"rgba(255,255,255,0.03)",borderRadius:12}}>
                    <p style={{color:GOLD,fontWeight:800,marginBottom:10}}>ATTENDING EXPLANATION</p>
                    <p style={{lineHeight:1.6}}>{question.explanation}</p>
                    <button onClick={handleLoadNext} style={{marginTop:20,width:"100%",padding:12,background:"transparent",border:"1px solid "+GOLD,color:GOLD,fontWeight:800,borderRadius:8}}>Next Item {preloadedQ ? '(Instant Ready)' : '(Pre-loading...)'}</button>
                  </div>}
              </div>
            )}
          </div>
        )}

        {tab==="guides" && (
          <div className="fade" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:15}}>
            {GUIDES.map(g=><a key={g.id} href={g.u} target="_blank" style={{textDecoration:"none",background:CARD,padding:15,borderRadius:10,border:"1px solid "+BDR,display:"flex",alignItems:"center",gap:15}}><div style={{width:35,height:35,background:NAVY,color:GOLD,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6,fontWeight:900}}>{g.i}</div><div><div style={{color:"#f1f5f9",fontSize:13,fontWeight:700}}>{g.t}</div><div style={{fontSize:11,color:"#64748b"}}>{g.s}</div></div></a>)}
          </div>
        )}

        {tab==="progress" && (
          <div className="fade">
            <h2 style={{fontSize:24,fontWeight:800,marginBottom:20}}>Performance Analytics</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:20}}>
               <div style={{background:CARD,padding:25,borderRadius:16,textAlign:"center"}}><div style={{fontSize:42,fontWeight:900,color:"#3b82f6"}}>{history.t}</div><p style={{color:"#64748b"}}>Items Answered</p></div>
               <div style={{background:CARD,padding:25,borderRadius:16,textAlign:"center"}}><div style={{fontSize:42,fontWeight:900,color:"#10b981"}}>{history.c}</div><p style={{color:"#64748b"}}>Correct Answers</p></div>
               <div style={{background:CARD,padding:25,borderRadius:16,textAlign:"center"}}><div style={{fontSize:42,fontWeight:900,color:GOLD}}>{history.t>0?Math.round(history.c/history.t*100)+"%":"—"}</div><p style={{color:"#64748b"}}>Mastery Score</p></div>
            </div>
          </div>
        )}
      </div>

      {showAuth && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={(e)=>e.target===e.currentTarget && setShowAuth(false)}>
           <div style={{background:"#0f172a", padding:40, borderRadius:20, border:"1px solid "+BDR, textAlign:"center"}}>
              <h3 style={{color:"#f1f5f9", marginBottom:20}}>Academic Login</h3>
              <button onClick={()=>sb.auth.signInWithOAuth({provider:'google', options:{redirectTo:'https://medboardpro.org'}})} style={{padding:"15px 30px", background:"#fff", color:"#000", borderRadius:10, fontWeight:800, cursor:"pointer", border:"none"}}>Continue with Google</button>
           </div>
        </div>
      )}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
