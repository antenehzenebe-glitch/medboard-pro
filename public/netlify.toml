[build]
  # Changed from "public" to "." so Netlify looks in your main folder!
  publish = "." 
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  timeout = 60

[functions."generate-mcq"]
  timeout = 60

# We are temporarily turning off the CSP headers. 
# Once the app is visible and working, we can turn them back on carefully!
